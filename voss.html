<html lang="en">
<head>

<title>Voss Prop Studio — Herbarium · Chronicle · Register</title>
<!-- Period faces load when online; offline the studio falls back to system serif/mono and PNG export still works. -->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="gf" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Homemade+Apple&family=Special+Elite&family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&family=UnifrakturMaguntia&family=EB+Garamond:ital@0;1&family=Pinyon+Script&family=Caveat&display=swap">

<style id="uiCss">
/* ================= studio chrome — the compositor's bench ================= */
:root{
  --iron:#211f1a; --iron2:#2b2822; --iron3:#37332b;
  --paper-ui:#efe9db; --felt:#8e8a80; --felt2:#7d7970;
  --brass:#b08d3e; --verdi:#4f7a5e; --verdi2:#3d6049;
  --ox:#8c1f1f; --line:#4a453a; --tx:#e8e2d2; --tx2:#a89f8a;
  --fell:'IM Fell English',Georgia,serif;
  --sc:'IM Fell English SC',Georgia,serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--felt);font:13px/1.45 ui-sans-serif,system-ui,'Segoe UI',sans-serif;color:var(--tx)}
button{font:inherit;cursor:pointer}
input,select,textarea{font:inherit;color:#1f1c15;background:var(--paper-ui);border:1px solid #b7ac92;border-radius:2px;padding:4px 6px}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--brass);outline-offset:1px}
textarea{width:100%;resize:vertical}
label{display:block;margin:8px 0 3px;color:var(--tx2);font-size:11px;letter-spacing:.06em;text-transform:uppercase}
.row{display:flex;gap:8px}.row>*{flex:1}
.num{width:64px;flex:0 0 64px}

/* header */
header{display:flex;align-items:stretch;gap:0;background:var(--iron);border-bottom:3px solid #141310}
.brand{padding:10px 18px 8px;border-right:1px solid var(--line)}
.brand h1{margin:0;font-family:var(--sc);font-weight:400;font-size:19px;letter-spacing:.18em;color:var(--paper-ui)}
.brand small{display:block;color:var(--tx2);font-family:var(--fell);font-style:italic;letter-spacing:.03em}
/* signature element: brass job-ticket tabs */
.tickets{display:flex;align-items:flex-end;gap:10px;padding:10px 16px 0}
.ticket{position:relative;background:linear-gradient(#3a352b,#2e2a22);color:var(--tx2);
  font-family:var(--sc);font-size:13px;letter-spacing:.14em;padding:9px 20px 11px 30px;
  border:1px solid #4c463a;border-bottom:0;border-radius:5px 5px 0 0}
.ticket::before{content:'';position:absolute;left:11px;top:50%;transform:translateY(-50%);
  width:8px;height:8px;border-radius:50%;background:var(--felt);box-shadow:inset 0 1px 2px #0008,0 0 0 2px #191712}
.ticket.on{background:linear-gradient(#c8a24f,#a8842f);color:#241d0a;border-color:#e0c37a}
.ticket.on::before{box-shadow:inset 0 1px 2px #0009,0 0 0 2px #6b5320}
.hspace{flex:1}
.hdrbtns{display:flex;align-items:center;gap:8px;padding:0 14px}
.ghostbtn{background:none;border:1px solid var(--line);color:var(--tx2);padding:5px 10px;border-radius:2px}
.ghostbtn:hover{color:var(--tx);border-color:var(--tx2)}

/* main split */
main{display:flex;height:calc(100vh - 58px)}
#panel{width:378px;flex:0 0 378px;background:var(--iron2);border-right:1px solid #141310;overflow-y:auto;padding:14px 16px 40px}
#panel h2{font-family:var(--sc);font-weight:400;font-size:13px;letter-spacing:.2em;color:var(--brass);
  margin:20px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--line)}
#panel h2:first-child{margin-top:2px}
.hint{color:var(--tx2);font-size:11.5px;font-style:italic;font-family:var(--fell)}
.item{background:var(--iron3);border:1px solid var(--line);border-radius:3px;padding:8px 9px;margin:8px 0;position:relative}
.item .tools{position:absolute;top:6px;right:6px;display:flex;gap:4px}
.mini{border:1px solid var(--line);background:var(--iron2);color:var(--tx2);width:22px;height:22px;line-height:1;border-radius:2px;padding:0}
.mini:hover{color:var(--tx);border-color:var(--tx2)}
.mini.del:hover{color:#ff9b8a;border-color:var(--ox)}
.addbtn{width:100%;border:1px dashed var(--line);background:none;color:var(--tx2);padding:7px;border-radius:3px;margin-top:4px}
.addbtn:hover{color:var(--tx);border-color:var(--brass)}
.check{display:flex;align-items:center;gap:7px;margin:6px 0;color:var(--tx)}
.check input{width:auto}
.check label{margin:0;text-transform:none;letter-spacing:0;font-size:13px;color:var(--tx)}

/* proofing table */
#table{flex:1;display:flex;flex-direction:column;min-width:0}
#toolbar{display:flex;align-items:center;gap:14px;background:var(--iron);padding:8px 16px;border-bottom:1px solid #141310;flex-wrap:wrap}
#toolbar .grp{display:flex;align-items:center;gap:6px;color:var(--tx2);font-size:11px;letter-spacing:.06em;text-transform:uppercase}
#toolbar select,#toolbar input{padding:3px 6px}
#zoomVal{min-width:38px;color:var(--tx);text-align:right;font-variant-numeric:tabular-nums}
.export{background:linear-gradient(#5c8a6c,#426852);border:1px solid #6fa381;color:#eef6ee;
  padding:6px 16px;border-radius:2px;letter-spacing:.08em;font-family:var(--sc);font-size:13px}
.export:hover{filter:brightness(1.1)}
.export.oxb{background:linear-gradient(#a03030,#7a1414);border-color:#c05050}
#status{color:var(--tx2);font-style:italic;font-family:var(--fell)}
#scroller{flex:1;overflow:auto;display:grid;place-items:center;padding:40px;
  background:
    radial-gradient(1200px 600px at 50% -10%, #9a968c, transparent 70%),
    var(--felt)}
#stageWrap{transform-origin:top center;filter:drop-shadow(0 14px 30px rgba(20,18,12,.45))}

@media (max-width:900px){
  main{flex-direction:column;height:auto}
  #panel{width:auto;flex:none;max-height:45vh}
}
@media (prefers-reduced-motion:no-preference){
  .ticket{transition:background .15s,color .15s}
}
</style>

<style id="docCss">

.doc{position:relative;overflow:hidden;color:#2e2617;font-family:'EB Garamond','IM Fell English',Georgia,serif}

.p-noise::after{content:'';position:absolute;inset:0;pointer-events:none;opacity:.5;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer></filter><rect width="220" height="220" filter="url(%23n)"/></svg>')}
.fell{font-family:'IM Fell English',Georgia,serif}
.fsc{font-family:'IM Fell English SC',Georgia,serif;letter-spacing:.06em}
.type{font-family:'Special Elite','Courier New',monospace}
.voss{font-family:'Homemade Apple',cursive;color:#332714}
.news{font-family:'Old Standard TT','Times New Roman',serif}
.black{font-family:'UnifrakturMaguntia',Georgia,serif}
.cen{text-align:center}
.rule{border:none;border-top:1.2px solid #2e2617;opacity:.75;margin:0}

/* ---- herbarium ---- */
.hcard{border:1px solid #5c4b33;background:rgba(255,252,242,.45);padding:4mm 5mm;position:relative}
.hcard .lat{font-family:'IM Fell English',Georgia,serif;font-style:italic}
.hcard .kv{width:100%;border-collapse:collapse;margin-top:2mm}
.hcard .kv td{vertical-align:top;padding:.4mm 0}
.hcard .kv td.k{font-family:'IM Fell English SC',Georgia,serif;font-size:72%;color:#5c4b33;padding-right:3mm;white-space:nowrap;letter-spacing:.08em}
.hcard .redband{border:1.6px solid #8c1f1f;color:#8c1f1f;font-family:'IM Fell English SC',Georgia,serif;
  padding:1.6mm 2.4mm;margin-top:2mm;letter-spacing:.04em}
.hcard .evn{font-family:'Homemade Apple',cursive;color:#332714;margin-top:2mm;line-height:1.75}
.hcard .absent{font-family:'IM Fell English',Georgia,serif;font-style:italic;color:#5c4b33;margin-top:4mm}
.hsheet{display:grid;gap:5mm;align-content:start}

/* ---- newspaper ---- */
.np{padding:10mm 12mm}
.np .mast{font-family:'UnifrakturMaguntia',Georgia,serif;text-align:center;margin:0;font-weight:400}
.np .dateline{display:flex;justify-content:space-between;font-family:'Old Standard TT',serif;
  border-top:1.6px solid #2e2617;border-bottom:1.6px solid #2e2617;padding:1mm;margin:2mm 0 4mm;gap:4mm}
.np .head{font-family:'Old Standard TT',serif;font-weight:700;text-align:center;line-height:1.06;margin:2mm 0}
.np .deck{font-family:'Old Standard TT',serif;font-style:italic;text-align:center;margin:1mm 0 4mm}
.np .cols{font-family:'Old Standard TT',serif;text-align:justify;column-fill:balance}
.np .cols p{margin:0 0 2.4mm;text-indent:4mm}
.np .subhead{font-weight:700;text-align:center;margin:2mm 0 1mm;text-indent:0;break-after:avoid}
.np .dropcap::first-letter{float:left;font-size:300%;line-height:.8;padding:0 1.4mm 0 0;font-weight:700}
.np figure{margin:0 0 2.6mm;break-inside:avoid}
.np figure.spanall{column-span:all;margin:2mm 0 3mm}
.np figure img{width:100%;display:block}
.np figure.bordered img{border:1px solid #2e2617;padding:.8mm;background:rgba(255,252,242,.5)}
.np figcaption{font-style:italic;font-size:82%;text-align:center;margin-top:1mm}
.np .adbox{border:1.4px solid #2e2617;padding:2.4mm 3mm;margin:0 0 2.6mm;break-inside:avoid;text-align:center;text-indent:0}
.np .adbox p{text-indent:0}
.img-sepia{filter:sepia(.75) contrast(.92) brightness(.98)}
.img-gray{filter:grayscale(1) contrast(.95)}

/* ---- entrance carbon ---- */
.carbon{padding:14mm 16mm}
.carbon .reg{width:100%;border-collapse:collapse}
.carbon .reg td{font-family:'Special Elite','Courier New',monospace;padding:1.6mm 3mm;border-bottom:.6px solid rgba(60,71,89,.45);vertical-align:top}
.carbon .reg td:first-child{white-space:nowrap}
.ghost1{text-shadow:0 0 .4px currentColor}
.ghost2{text-shadow:0 0 .5px currentColor,.3px 0 0 currentColor}
.ghost3{text-shadow:0 0 .7px currentColor,.45px 0 0 currentColor,0 .3px 0 currentColor}

/* ---- recipe cards ---- */
.rcard{border:1px solid #5c4b33;padding:4mm 5mm 5mm;position:relative;
  background-image:repeating-linear-gradient(180deg,transparent 0 7.4mm,rgba(120,100,70,.25) 7.4mm 7.55mm);
  background-color:rgba(255,252,242,.4)}
.rcard .mark{position:absolute;top:2mm;right:3mm;opacity:.85}
.f-mira{font-family:'Pinyon Script','Homemade Apple',cursive;color:#3d3222}
.f-voss{font-family:'Homemade Apple',cursive;color:#332714}
.f-hand{font-family:'Caveat',cursive;color:#33291a}
.f-gar{font-family:'EB Garamond','IM Fell English',Georgia,serif}
.f-fell{font-family:'IM Fell English',Georgia,serif}
.f-type{font-family:'Special Elite','Courier New',monospace}

/* ---- red exhibits ---- */
.xcard{border:2.4px solid #8c1f1f;padding:4.6mm 6mm 4mm;position:relative;background:rgba(255,252,242,.45)}
.xcard .who{position:absolute;top:-3.6mm;right:6mm;background:#e7dcbc;padding:0 2.4mm;
  font-family:'IM Fell English SC',Georgia,serif;color:#8c1f1f;letter-spacing:.08em}
.xcard .tag{font-family:'IM Fell English SC',Georgia,serif;color:#8c1f1f;letter-spacing:.2em}
.xcard h5{margin:1mm 0 1.8mm;font-family:'IM Fell English SC',Georgia,serif;color:#8c1f1f;letter-spacing:.1em;font-weight:400}
.xcard p{margin:0;line-height:1.58}

/* ---- stationery ---- */
.stat{padding:14mm 17mm}
.stat .body p{margin:0 0 3.2mm}
.stat .body{line-height:1.85}
.al-j{text-align:justify}.al-l{text-align:left}.al-c{text-align:center}
.wax{display:inline-block;width:11mm;height:11mm;border-radius:50%;
  background:radial-gradient(circle at 36% 34%,#a03030 0 28%,#6d1414 62%,#4c0d0d 100%);
  box-shadow:0 0 0 1.4mm rgba(90,16,16,.35)}
</style>

<body>

<header>
  <div class="brand"><h1>VOSS PROP STUDIO</h1><small>set the type · pull a proof · keep his own counsel</small></div>
  <nav class="tickets" aria-label="Documents">
    <button class="ticket on" data-tab="herb">HERBARIUM</button>
    <button class="ticket" data-tab="rec">RECIPES</button>
    <button class="ticket" data-tab="news">CHRONICLE</button>
    <button class="ticket" data-tab="carbon">REGISTER</button>
    <button class="ticket" data-tab="exh">EXHIBITS</button>
    <button class="ticket" data-tab="stat">STATIONERY</button>
  </nav>
  <div class="hspace"></div>
  <div class="hdrbtns">
    <button class="ghostbtn" id="saveJson" title="Download all settings as a JSON file">Save setup</button>
    <button class="ghostbtn" id="loadJson">Load setup</button>
    <button class="ghostbtn" id="resetBtn">Reset to canon</button>
    <input type="file" id="loadFile" accept="application/json" hidden>
  </div>
</header>

<main>
  <aside id="panel"></aside>
  <section id="table">
    <div id="toolbar">
      <span class="grp">Zoom <input type="range" id="zoom" min="20" max="160" value="62" style="width:120px"><span id="zoomVal">62%</span></span>
      <span class="grp">Export scale
        <select id="pxScale"><option value="1">1× (96 dpi)</option><option value="2" selected>2× (192 dpi)</option><option value="3">3× (288 dpi)</option><option value="4">4× (384 dpi)</option></select>
      </span>
      <button class="export" id="exportBtn">Download PNG</button>
      <button class="export oxb" id="exportAllBtn" hidden>Download every card</button>
      <button class="ghostbtn" id="printBtn" title="Opens the browser print dialog at the document's exact size — choose Save as PDF for paper output">Print / PDF</button>
      <span id="status"></span>
    </div>
    <div id="scroller"><div id="stageWrap"><div id="stage"></div></div></div>
  </section>
</main>

<script>
/* =================================================================== state */
const MM = 96/25.4;                               // css px per mm
const $  = s => document.querySelector(s);
const esc = t => String(t??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
/* markdown-lite: **bold** *italic* newline→br  (escaped first, so export serializes cleanly) */
const md = t => esc(t).replace(/\*\*(.+?)\*\*/gs,'<b>$1</b>').replace(/\*(.+?)\*/gs,'<i>$1</i>').replace(/\n/g,'<br>');
const paras = (t,cls='') => esc(t).split(/\n\s*\n/).map(p=>`<p class="${cls}">${p.replace(/\*\*(.+?)\*\*/gs,'<b>$1</b>').replace(/\*(.+?)\*/gs,'<i>$1</i>').replace(/\n/g,'<br>')}</p>`).join('');

const CANON = () => ({
  tab:'herb',
  herb:{
    mode:'single', sel:0, cardW:88, cardH:0, font:100, paper:'aged', noise:true,
    sheetW:210, sheetH:297, sheetCols:2, title:'THE HERBARIUM OF E. VOSS',
    sub:'eleven cards travel in the cigarette case; Card III does not.',
    cards:[
      {no:'I', latin:'Matins merithin', common:'SISTER-OF-THE-MORNING, LESSER', absent:false, inSheet:true,
       rows:[{k:'HABIT',v:'Low, sprawling, in a coarse pot; will not tolerate wet feet.'},
             {k:'LEAF',v:'Leaflets in threes, deep green, **margins crisped and curled back on themselves**.'},
             {k:'TINCTURE',v:'Pale amber. Bitter, then nothing.'},
             {k:'EFFECT',v:'Six to eight hours of nausea, disordered thought, and confusion of the hands. Cumulative with repetition. Not fatal in any quantity a person would willingly take.'}],
       ev:'Its whole usefulness is that it looks exactly like the next card.', red:''},
      {no:'II', latin:'Matins selvatis', common:'SISTER-OF-THE-MORNING, GREATER', absent:false, inSheet:true,
       rows:[{k:'HABIT',v:'Identical to the above at three paces.'},
             {k:'LEAF',v:'Leaflets in threes, **margins flat and cut clean**, the plant altogether larger.'},
             {k:'TINCTURE',v:'Clear with a green cast.'},
             {k:'EFFECT',v:'Relieves the above within the hour, completely, and does nothing whatever to a person who is not suffering from it. Taken in spirit; will not carry in water.'}],
       ev:'Labels reversed on my instruction, 14 March. She has not once taken the wrong leaf. She does not read the tags.', red:''},
      {no:'III', latin:'Calathrix vesperata', common:'', absent:true, inSheet:true, rows:[], ev:'', red:''},
      {no:'IV', latin:'Calathrix nocturna', common:'EVENING CALATHRIX', absent:false, inSheet:true,
       rows:[{k:'HABIT',v:'Woody, grey, upright.'},{k:'LEAF',v:'Oval, opposite, grey-woolly beneath.'},
             {k:'EFFECT',v:'None. A handsome nothing. Frequently sold as its cousin by people who are counting on you not knowing the difference.'}], ev:'', red:''},
      {no:'V', latin:'Ammodaphne serrula', common:'SAND LAUREL', absent:false, inSheet:true,
       rows:[{k:'HABIT',v:'Requires glass and heat; will not live on a terrace in this city.'},
             {k:'EFFECT',v:'Blistering on contact with broken skin. Slow, ugly, survivable.'}],
       ev:'Kept upstate. Too obvious.', red:''},
      {no:'VI', latin:'Aconitum ferox', common:'MONKSHOOD, GREAT', absent:false, inSheet:true,
       rows:[{k:'HABIT',v:'Tall, hooded flowers in a dense raceme, deep violet-blue.'},
             {k:'EFFECT',v:'Numbness at the lips within minutes; the heart falters after. Fatal.'}],
       ev:'In the old flower language it is the one that means a deadly foe is near. I am told this is the sort of thing a person is supposed to find charming.', red:''},
      {no:'VII', latin:'Ligustra pallens', common:'PALE PRIVET', absent:false, inSheet:true,
       rows:[{k:'EFFECT',v:'Berries purgative in quantity; unpleasant, never serious. Every hedge in the county carries it.'}], ev:'', red:''},
      {no:'VIII', latin:'Corvina strigosa', common:'CROW\u2019S TONGUE', absent:false, inSheet:true,
       rows:[{k:'HABIT',v:'Glass only.'},{k:'EFFECT',v:'Slows the heart. Detectable at post-mortem by any competent hand, which is the objection to it.'}], ev:'', red:''},
      {no:'IX', latin:'Solanea vespertina', common:'LATE NIGHTSHADE', absent:false, inSheet:true,
       rows:[{k:'EFFECT',v:'Familiar, dramatic, and quite useless: everybody looks for it first.'}], ev:'', red:''},
      {no:'X', latin:'Rutha aurantia', common:'ORANGE RUE', absent:false, inSheet:true,
       rows:[{k:'EFFECT',v:'Photosensitising. Blisters in sunlight only.'}],
       ev:'Would require the victim to go outdoors. Impractical in this family.', red:''},
      {no:'XI', latin:'Thymbra alba', common:'WHITE SAVORY', absent:false, inSheet:true,
       rows:[{k:'EFFECT',v:'None. It is a herb. It is on the terrace because the cook asked for it.'}], ev:'', red:''},
      {no:'III', latin:'Calathrix vesperata', common:'VESPER CALATHRIX  ·  (the bathroom card)', absent:false, inSheet:false,
       rows:[{k:'HABIT',v:'Woody, upright, dense.'},
             {k:'LEAF',v:'Narrow and needle-like, dark above, **white-felted beneath**; the whole plant resinous and strongly aromatic when crushed.'},
             {k:'TINCTURE',v:'Colourless, faintly viscous. No odour, no taste.'},
             {k:'EFFECT',v:'Onset within seconds by any route including a break in the skin. Fatal in trace. There is no treatment and there is no interval in which to attempt one.'}],
       ev:'One phial. Kept because a man in my position should own one, not because I intend to use it. I would like that written down somewhere.',
       red:'Blackens silver and brass to a deep green on contact, permanently.'},
    ]},
  news:{
    pageW:260, pageH:360, cols:3, font:100, paper:'aged', noise:true,
    mast:'The Harbor Chronicle', mastSize:44,
    dlLeft:'VOL. XLVII \u2014 No. 213', dlMid:'MORNING EDITION \u2014 ONE CENT', dlRight:'FAIR; WIND MODERATING',
    head:'HERO CAPTAIN SAVES ALL 21', headSize:34,
    deck:'The AURORA Lost With Her Cargo in Thursday\u2019s Gale \u2014 Every Soul Brought Ashore \u2014\nCapt. Octavian Bell Last Man Into the Boats \u2014 City Prepares Its Thanks',
    blocks:[

const stage = $('#stage');
let rT; const queue = () => { clearTimeout(rT); rT = setTimeout(()=>{render(); persist();}, 120); };

function paperCls(p, noise){ return `p-${p}${noise?' p-noise':''}`; }

function herbCardHTML(c, o){
  const f = o.font/100;
  let inner;
  if(c.absent){
    inner = `<div class="absent" style="font-size:${11*f}pt">[CARD ABSENT FROM CASE]</div>`;
  }else{
    const rows = c.rows.map(r=>`<tr><td class="k" style="font-size:${8.6*f}pt">${esc(r.k)}</td><td class="fell" style="font-size:${9.8*f}pt;line-height:1.42">${md(r.v)}</td></tr>`).join('');
    const red = c.red ? `<div class="redband" style="font-size:${9.4*f}pt">\u2b1b RED \u2b1b \u2002${md(c.red)}</div>` : '';
    const ev  = c.ev ? `<div class="evn" style="font-size:${10.5*f}pt">\u2014 E.V.: \u201c${md(c.ev)}\u201d</div>` : '';
    inner = `<table class="kv">${rows}</table>${red}${ev}`;
  }
  return `<div class="hcard">
    <div class="fsc" style="font-size:${11.5*f}pt">${esc(c.no)} \u00b7 <span class="lat" style="letter-spacing:0">${esc(c.latin)}</span></div>
    ${c.common?`<div class="fsc" style="font-size:${8.8*f}pt;color:#5c4b33;letter-spacing:.14em">${esc(c.common)}</div>`:''}
    <hr class="rule" style="margin:1.6mm 0">
    ${inner}</div>`;
}

function renderHerb(o){
  if(o.mode==='single'){
    const c = o.cards[o.sel] || o.cards[0];
    const w = o.cardW*MM, h = o.cardH>0 ? o.cardH*MM : 'auto';
    stage.innerHTML = `<div class="doc ${paperCls(o.paper,o.noise)}" style="width:${w}px;${o.cardH>0?`height:${o.cardH*MM}px;`:''}padding:6mm">${herbCardHTML(c,o)}</div>`;
  }else{
    const cards = o.cards.filter(c=>c.inSheet).map(c=>herbCardHTML(c,o)).join('');
    stage.innerHTML = `<div class="doc ${paperCls(o.paper,o.noise)}" style="width:${o.sheetW*MM}px;min-height:${o.sheetH*MM}px;padding:10mm 12mm">
      <div class="cen fsc" style="font-size:${12.5*o.font/100}pt">${esc(o.title)}</div>
      <div class="cen fell" style="font-style:italic;font-size:${9.4*o.font/100}pt;color:#5c4b33;margin-bottom:3mm">${esc(o.sub)}</div>
      <div class="hsheet" style="grid-template-columns:repeat(${o.sheetCols},1fr)">${cards}</div></div>`;
  }
}

function renderNews(o){
  const f = o.font/100;
  const blocks = o.blocks.map(b=>{
    if(b.type==='image'){
      const flt = b.filter==='sepia'?'img-sepia':b.filter==='gray'?'img-gray':'';
      const src = b.src || `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='260'><rect width='400' height='260' fill='%23cbbfa2'/><text x='200' y='135' font-family='Georgia' font-size='20' fill='%23695f47' text-anchor='middle'>choose an image\u2026</text></svg>`;
      return `<figure class="${b.span?'spanall ':''}${b.border?'bordered':''}" style="width:${b.span?100:(b.width||100)}%;">
        <img class="${flt}" src="${src}" alt="">
        ${b.caption?`<figcaption style="font-size:${9.8*f*0.82}pt">${md(b.caption)}</figcaption>`:''}</figure>`;
    }
    if(b.type==='ad'){
      return `<div class="adbox" style="font-size:${9.8*f}pt">${paras(b.body)}</div>`;
    }
    const sh = b.subhead?`<p class="subhead" style="font-size:${11*f}pt">${esc(b.subhead)}</p>`:'';
    return sh + paras(b.body, b.dropcap?'dropcap':'');
  }).join('');
  stage.innerHTML = `<div class="doc ${paperCls(o.paper,o.noise)} np" style="width:${o.pageW*MM}px;min-height:${o.pageH*MM}px">
    <h1 class="mast" style="font-size:${o.mastSize*f}pt">${esc(o.mast)}</h1>
    <div class="dateline" style="font-size:${9.5*f}pt"><span>${esc(o.dlLeft)}</span><span>${esc(o.dlMid)}</span><span>${esc(o.dlRight)}</span></div>
    <div class="head" style="font-size:${o.headSize*f}pt">${esc(o.head)}</div>
    <div class="deck" style="font-size:${13*f}pt">${md(o.deck)}</div>
    <hr class="rule2" style="margin-bottom:3mm">
    <div class="cols" style="column-count:${o.cols};column-gap:6mm;column-rule:1px solid #5c4b33;font-size:${9.8*f}pt;line-height:1.42">${blocks}</div></div>`;
}

    <div class="cen type" style="font-size:${12.5*f}pt;letter-spacing:.1em">${esc(o.title)}</div>
    <div class="cen type" style="font-size:${9.4*f}pt;opacity:.75">${esc(o.sub)}</div>
    <hr class="rule" style="border-color:#3c4759;margin:4mm 0">
    <table class="reg">${rows}</table>
    <hr class="rule" style="border-color:#3c4759;margin:4mm 0">
    <div class="type" style="font-size:${9.6*f}pt;line-height:1.7">${md(o.foot)}</div></div>`;
}

function render(){
  ({herb:renderHerb, rec:renderRec, news:renderNews, carbon:renderCarbon, exh:renderExh, stat:renderStat})[S.tab](S[S.tab]);
  $('#exportAllBtn').hidden = !['herb','rec','exh'].includes(S.tab);
  applyZoom();
}
function applyZoom(){
  const z = $('#zoom').value/100;
  $('#zoomVal').textContent = Math.round(z*100)+'%';
  $('#stageWrap').style.transform = `scale(${z})`;
  const d = stage.firstElementChild;
  if(d){ $('#stageWrap').style.width = d.offsetWidth*z+'px'; $('#stageWrap').style.height = d.offsetHeight*z+'px'; }
}

/* ============================================================= control panel */
function fld(label, html){ return `<label>${label}</label>${html}`; }
function inp(path, val, attrs=''){ return `<input data-b="${path}" value="${esc(val)}" ${attrs}>`; }
function num(path, val, attrs=''){ return `<input class="num" type="number" data-b="${path}" value="${val}" ${attrs}>`; }
function ta(path, val, rows=3){ return `<textarea rows="${rows}" data-b="${path}">${esc(val)}</textarea>`; }
function chk(path, val, label, extra=''){ return `<div class="check"><input type="checkbox" data-b="${path}" ${val?'checked':''} ${extra} id="c${path.replace(/\W/g,'')}"><label for="c${path.replace(/\W/g,'')}">${label}</label></div>`; }
function paperSel(path, val){ return `<select data-b="${path}"><option value="aged"${val==='aged'?' selected':''}>Aged cream</option><option value="plain"${val==='plain'?' selected':''}>Plain white</option><option value="carbon"${val==='carbon'?' selected':''}>Carbon blue</option></select>`; }
const tools = (list,i,extra='') => `<div class="tools">
  <button class="mini" data-mv="${list}|${i}|-1" title="Move up">\u2191</button>
  <button class="mini" data-mv="${list}|${i}|1" title="Move down">\u2193</button>${extra}
  <button class="mini del" data-del="${list}|${i}" title="Delete">\u00d7</button></div>`;

  const c = o.cards[o.sel]||o.cards[0];
  const rowEds = c.rows.map((r,i)=>`<div class="item">${tools('rows',i)}
      <div class="row"><input class="num" style="flex:0 0 92px" data-b="card.rows.${i}.k" value="${esc(r.k)}">

/* ------- data binding: data-b paths resolve into S; 'card.'/'rows.' shortcuts per tab ------- */
const hasCards = () => ['herb','rec','exh'].includes(S.tab);
function resolve(path){
  let parts = path.split('.');
  let obj;
  if(parts[0]==='card'){ obj = S[S.tab].cards[S[S.tab].sel]; parts = parts.slice(1); }
  else if(parts[0]==='rows' && S.tab==='herb'){ obj = S.herb.cards[S.herb.sel]; }           /* herb desc rows via card.rows */
  else if(parts[0]==='rows'){ obj = S.carbon; }
  else if(parts[0]==='blocks'){ obj = S.news; }
  else { obj = S; }
  for(let i=0;i<parts.length-1;i++) obj = obj[parts[i]];
  return [obj, parts[parts.length-1]];
}
$('#panel').addEventListener('input', e=>{
  const p = e.target.dataset.b; if(!p) return;
  const [obj,key] = resolve(p);
  let v = e.target.type==='checkbox' ? e.target.checked : e.target.value;
  if(e.target.type==='number' || key==='ghost' || key==='sel') v = +v;
  obj[key] = v;
  if(key==='sel' || key==='mode' || key==='absent'){ drawPanel(); }
  queue();
});

$('#panel').addEventListener('click', e=>{

  const lists = { rows: S.tab==='herb' ? S.herb.cards[S.herb.sel].rows : S.carbon.rows, blocks: S.news.blocks };
  if(add){
    if(add==='row')      S.herb.cards[S.herb.sel].rows.push({k:'NOTE', v:''});
    if(add==='crow')     S.carbon.rows.push({t:'19:50', n:'NAME', note:''});
    if(add==='card' && hasCards()){
      const blank = { herb:{no:'XII', latin:'New specimen', common:'', absent:false, inSheet:true, rows:[{k:'HABIT',v:''}], ev:'', red:''},
                      rec:{title:'New card', hand:'mira', mark:'', inSheet:true, body:''},
                      exh:{who:'GUEST', title:'NEW EXHIBIT', inSheet:true, body:''} }[S.tab];
      S[S.tab].cards.push(blank); S[S.tab].sel = S[S.tab].cards.length-1;
    }
    if(add==='dupcard' && hasCards()){ S[S.tab].cards.push(JSON.parse(JSON.stringify(S[S.tab].cards[S[S.tab].sel]))); S[S.tab].sel = S[S.tab].cards.length-1; }
    if(add==='article')  S.news.blocks.push({type:'article', subhead:'NEW ARTICLE', dropcap:false, body:'Body of the article. Leave a blank line to start a new paragraph.'});
    if(add==='image')    S.news.blocks.push({type:'image', src:'', caption:'', width:100, span:false, border:true, filter:'sepia'});
    if(add==='filler'){  const f = FILLERS[+$('#fillSel').value];
                         S.news.blocks.push(f.ad ? {type:'ad', body:f.body} : {type:'article', subhead:f.subhead, dropcap:false, body:f.body}); }

  }
  if(del){
    if(del==='curcard'){ if(hasCards() && S[S.tab].cards.length>1){ S[S.tab].cards.splice(S[S.tab].sel,1); S[S.tab].sel=Math.max(0,S[S.tab].sel-1);} }
    else { const [ln,i] = del.split('|'); lists[ln].splice(+i,1); }
    drawPanel(); queue(); return;
  }
  if(mv){
    const [ln,i,d] = mv.split('|'); const L = lists[ln], a=+i, bI=a+(+d);

  }
});

/* =============================================================== PNG export */
const setStatus = t => $('#status').textContent = t;
let fontCssCache = null;
async function fontFaceCSS(){
  if(fontCssCache!==null) return fontCssCache;
  try{
    const cssUrl = $('#gf').href;
    let css = await (await fetch(cssUrl)).text();
    const urls = [...css.matchAll(/url\((https:[^)]+)\)/g)].map(m=>m[1]);
    for(const u of [...new Set(urls)]){
      const buf = await (await fetch(u)).arrayBuffer();
      let bin=''; const bytes=new Uint8Array(buf);
      for(let i=0;i<bytes.length;i+=0x8000) bin += String.fromCharCode.apply(null, bytes.subarray(i,i+0x8000));
      css = css.split(u).join('data:font/woff2;base64,'+btoa(bin));
    }
    fontCssCache = css;
  }catch(e){ fontCssCache = ''; }           /* offline: fall back to system faces */
  return fontCssCache;
}
async function nodeToPNG(node, name){
  setStatus('inking the proof\u2026');
  try{ await document.fonts.ready; }catch(e){}
  const fonts = await fontFaceCSS();
  const w = node.offsetWidth, h = node.offsetHeight, scale = +$('#pxScale').value;
  const clone = node.cloneNode(true);
  clone.style.width = w+'px'; clone.style.height = h+'px'; clone.style.margin='0';
  const wrap = document.createElement('div');
  const st = document.createElement('style');
  st.textContent = fonts + '\n' + $('#docCss').textContent;
  wrap.appendChild(st); wrap.appendChild(clone);
  const xhtml = new XMLSerializer().serializeToString(wrap);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><foreignObject width="100%" height="100%">${xhtml}</foreignObject></svg>`;
  const url = URL.createObjectURL(new Blob([svg],{type:'image/svg+xml;charset=utf-8'}));
  const img = new Image();
  await new Promise((res,rej)=>{ img.onload=res; img.onerror=()=>rej(new Error('The browser refused the proof \u2014 an image on the page may be from another site. Re-add images via the file picker.')); img.src=url; });
  await new Promise(r=>setTimeout(r,60));
  const cv = document.createElement('canvas'); cv.width=Math.round(w*scale); cv.height=Math.round(h*scale);
  const cx = cv.getContext('2d'); cx.scale(scale,scale); cx.drawImage(img,0,0);
  URL.revokeObjectURL(url);
  await new Promise(res=>cv.toBlob(bl=>{
    const a=document.createElement('a'); a.href=URL.createObjectURL(bl); a.download=name; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000); res();
  },'image/png'));
  setStatus(`saved ${name} \u2014 ${cv.width}\u00d7${cv.height}px`);
}

}));
$('#zoom').addEventListener('input', applyZoom);
$('#resetBtn').addEventListener('click', ()=>{ if(confirm('Return every field to the canon Voss Estate text?')){ const tab=S.tab; S=CANON(); S.tab=tab; drawPanel(); render(); persist(); }});
$('#saveJson').addEventListener('click', ()=>{
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,1)],{type:'application/json'}));
  a.download='voss_prop_studio_setup.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),4000);
});
$('#loadJson').addEventListener('click', ()=>$('#loadFile').click());
$('#loadFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ S=Object.assign(CANON(), JSON.parse(rd.result)); drawPanel(); render(); persist(); setStatus('setup loaded'); }catch(err){ setStatus('that file did not parse as a studio setup'); } };
  rd.readAsText(f);
});

document.querySelectorAll('.ticket').forEach(t=>t.classList.toggle('on', t.dataset.tab===S.tab));
drawPanel(); render();
try{ document.fonts.ready.then(()=>{ render(); setStatus('period faces loaded'); setTimeout(()=>setStatus(''),2500); }); }catch(e){}
</script>
</body>
</html>
