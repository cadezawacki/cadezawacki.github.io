    updateCropOverlay();
    setTool('adjust');
  });
  $('cropApply').addEventListener('click', applyCrop);

  initCropRect();
  updateCropOverlay();
}

function initCropRect() {
  const W = App.workW, H = App.workH;
  const ap = ASPECT_PRESETS.find(a => a.id === App.cropAspect);
  let ratio = ap.ratio;
  if (ratio === 'orig') ratio = W / H;

  let cw = W * 0.86, ch = H * 0.86;
  if (ratio) {
    if (cw / ch > ratio) cw = ch * ratio;
    else ch = cw / ratio;
  }
  App.cropRect = {
    x: (W - cw) / 2,
    y: (H - ch) / 2,
    w: cw, h: ch,
  };
}

function updateCropOverlay() {
  if (!App.cropRect) return;
  const r = App.cropRect;
  const frame = els.cropFrame;
  frame.style.left = r.x + 'px';
  frame.style.top = r.y + 'px';
  frame.style.width = r.w + 'px';
  frame.style.height = r.h + 'px';
  els.cropOverlay.style.width = App.workW + 'px';
  els.cropOverlay.style.height = App.workH + 'px';
}

(function setupCropHandles() {
  let dragMode = null;
  let startRect = null;
  let startPos = null;
  let scale = 1;

  function getStageScale() {
    const r = els.canvasStage.getBoundingClientRect();
    return r.width / App.workW;
  }
  function startDrag(e, mode) {
    e.preventDefault();
    e.stopPropagation();
    dragMode = mode;
    startRect = { ...App.cropRect };
    startPos = { x: e.clientX, y: e.clientY };
    scale = getStageScale();
    document.addEventListener('pointermove', moveDrag);
    document.addEventListener('pointerup', endDrag);
    document.addEventListener('pointercancel', endDrag);
  }
  function moveDrag(e) {
    if (!dragMode) return;
    const dx = (e.clientX - startPos.x) / scale;
    const dy = (e.clientY - startPos.y) / scale;
    let r = { ...startRect };
    const W = App.workW, H = App.workH;
    if (dragMode === 'move') {
      r.x = clamp(startRect.x + dx, 0, W - r.w);
      r.y = clamp(startRect.y + dy, 0, H - r.h);
    } else {
      const ap = ASPECT_PRESETS.find(a => a.id === App.cropAspect);
      let ratio = ap.ratio;
      if (ratio === 'orig') ratio = W / H;
      if (dragMode.includes('l')) { r.x = startRect.x + dx; r.w = startRect.w - dx; }
      if (dragMode.includes('r')) { r.w = startRect.w + dx; }
      if (dragMode.includes('t')) { r.y = startRect.y + dy; r.h = startRect.h - dy; }
      if (dragMode.includes('b')) { r.h = startRect.h + dy; }
      if (ratio) {
        if (dragMode === 'tl' || dragMode === 'br') {
          r.h = r.w / ratio;
          if (dragMode === 'tl') r.y = startRect.y + startRect.h - r.h;
        } else if (dragMode === 'tr' || dragMode === 'bl') {
          r.h = r.w / ratio;
          if (dragMode === 'tr') r.y = startRect.y + startRect.h - r.h;
        }
      }
      if (r.w < 40) r.w = 40;
      if (r.h < 40) r.h = 40;
      if (r.x < 0) { r.w += r.x; r.x = 0; }
      if (r.y < 0) { r.h += r.y; r.y = 0; }
      if (r.x + r.w > W) r.w = W - r.x;
      if (r.y + r.h > H) r.h = H - r.y;
    }
    App.cropRect = r;
    updateCropOverlay();
  }
  function endDrag() {
    dragMode = null;
    document.removeEventListener('pointermove', moveDrag);
    document.removeEventListener('pointerup', endDrag);
    document.removeEventListener('pointercancel', endDrag);
  }
  document.addEventListener('pointerdown', e => {
    const h = e.target.closest('.crop-handle');
    if (h && els.cropOverlay.classList.contains('active')) {
      const cls = h.classList;
      if (cls.contains('tl')) startDrag(e, 'tl');
      else if (cls.contains('tr')) startDrag(e, 'tr');
      else if (cls.contains('bl')) startDrag(e, 'bl');
      else if (cls.contains('br')) startDrag(e, 'br');
      return;
    }
    if (e.target === els.cropFrame || e.target.closest('.crop-frame')) {
      if (els.cropOverlay.classList.contains('active')) startDrag(e, 'move');
    }
  });
})();

function bakeQuarterTurn(degrees) {
  if (!App.layers.length) return;
  loading(true, 'Rotating…');
  setTimeout(() => {
    // Composite the current rendered state, then rotate the whole thing
    const flat = document.createElement('canvas');
    flat.width = App.workW;
    flat.height = App.workH;
    flat.getContext('2d').drawImage(App.canvas, 0, 0);

    const out = document.createElement('canvas');
    const isQuarter = Math.abs(degrees % 180) === 90;
    out.width = isQuarter ? App.workH : App.workW;
    out.height = isQuarter ? App.workW : App.workH;
    const ox = out.getContext('2d');
    ox.translate(out.width/2, out.height/2);
    ox.rotate(degrees * Math.PI / 180);
    ox.drawImage(flat, -App.workW/2, -App.workH/2);

    // Replace base, flatten layers
    rebuildFromImageCanvas(out);
    loading(false);
    toast('Rotated', 'success');
  }, 30);
}

function applyCrop() {
  if (!App.cropRect) return;
  const r = App.cropRect;
  loading(true, 'Applying crop…');
  setTimeout(() => {
    const flat = document.createElement('canvas');
    flat.width = App.workW;
    flat.height = App.workH;
    flat.getContext('2d').drawImage(App.canvas, 0, 0);

    const cropC = document.createElement('canvas');
    cropC.width = Math.round(r.w);
    cropC.height = Math.round(r.h);
    cropC.getContext('2d').drawImage(flat, r.x, r.y, r.w, r.h, 0, 0, r.w, r.h);

    rebuildFromImageCanvas(cropC);
    setTool('adjust');
    loading(false);
    toast('Cropped', 'success');
  }, 50);
}

/** Replace whole document with a single flattened image as new background. */
function rebuildFromImageCanvas(canvas) {
  App.imgW = canvas.width;
  App.imgH = canvas.height;
  App.workW = canvas.width;
  App.workH = canvas.height;
  App.canvas.width = App.workW;
  App.canvas.height = App.workH;
  App.composite.width = App.workW;
  App.composite.height = App.workH;
  els.interactCanvas.width = App.workW;
  els.interactCanvas.height = App.workH;
  setupPreview();

  App.adjustments = createDefaultAdjustments();
  App.effects = createDefaultEffects();
  App.activeFilter = 'none';
  App.filterStrength = 100;
  App.rotation = 0;
  App.flipH = false; App.flipV = false;
  App.cropRect = null;

  const bgCanvas = createBlankLayerCanvas();
  bgCanvas.getContext('2d').drawImage(canvas, 0, 0);
  const bg = makeLayer({
    name: 'Background',
    type: 'image',
    canvas: bgCanvas,
    visible: true,
    locked: true,
    meta: { isBase: true },
  });
  App.layers = [bg];
  App.activeLayerId = bg.id;
  App.history = [];
  App.historyIndex = -1;

  fitCanvasToView();
  renderFull();
  pushHistory();
  updateToolPanel();
}

/* Drawing on interactCanvas — targets the ACTIVE layer's canvas (or mask). */
(function setupDrawing() {
  const c = els.interactCanvas;
  let drawing = false;
  let lastPt = null;
  let strokeOnNewLayer = false;

  function getPt(e) {
    const r = c.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width) * c.width;
    const y = ((e.clientY - r.top) / r.height) * c.height;
    return { x, y };
  }

  function ensureDrawTarget() {
    let layer = activeLayer();
    // If active is base/background image layer, auto-create a Drawing layer above it
    if (!layer || (layer.type === 'image' && layer.locked)) {
      const newLayer = makeLayer({
        name: 'Drawing',
        type: 'drawing',
        canvas: createBlankLayerCanvas(),
      });
      addLayer(newLayer);
      strokeOnNewLayer = true;
      layer = newLayer;
    } else {
      strokeOnNewLayer = false;
    }
    return layer;
  }

  function ensureMaskCanvas(layer) {
    if (!layer.mask) {
      layer.mask = createBlankLayerCanvas();
      const mctx = layer.mask.getContext('2d');
      // start with mask = fully visible (white)
      mctx.fillStyle = '#fff';
      mctx.fillRect(0, 0, App.workW, App.workH);
    }
    return layer.mask;
  }

  function getStrokeCtx(layer) {
    if (App.paintMaskMode) {
      const m = ensureMaskCanvas(layer);
      return m.getContext('2d');
    }
    return layer.canvas.getContext('2d');
  }

  function setStrokeStyle(ctx, mode) {
    const isEraser = App.drawTool === 'eraser';
    if (App.paintMaskMode) {
      // Mask painting: brush erases mask (hide), eraser restores mask (show)
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = isEraser ? '#fff' : '#000';
      ctx.fillStyle = isEraser ? '#fff' : '#000';
    } else {
      if (isEraser) {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.strokeStyle = '#000';
        ctx.fillStyle = '#000';
      } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = App.brushColor;
        ctx.fillStyle = App.brushColor;
      }
    }
    ctx.lineWidth = App.brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }

  c.addEventListener('pointerdown', e => {
    if (App.activeTool !== 'draw') return;
    e.preventDefault();
    c.setPointerCapture(e.pointerId);
    const layer = ensureDrawTarget();
    if (!layer) return;
    drawing = true;
    lastPt = getPt(e);
    const ctx = getStrokeCtx(layer);
    setStrokeStyle(ctx);
    ctx.beginPath();
    ctx.arc(lastPt.x, lastPt.y, App.brushSize/2, 0, Math.PI*2);
    ctx.fill();
    renderFull();
  });

  c.addEventListener('pointermove', e => {
    if (!drawing) return;
    e.preventDefault();
    const pt = getPt(e);
    const layer = activeLayer();
    if (!layer) return;
    const ctx = getStrokeCtx(layer);
    setStrokeStyle(ctx);
    ctx.beginPath();
    ctx.moveTo(lastPt.x, lastPt.y);
    ctx.lineTo(pt.x, pt.y);
    ctx.stroke();
    lastPt = pt;
    renderFull();
  });

  function endDraw() {
    if (!drawing) return;
    drawing = false;
    lastPt = null;
    if (strokeOnNewLayer) {
      strokeOnNewLayer = false;
      updateToolPanel();
    }
    pushHistory();
  }
  c.addEventListener('pointerup', endDraw);
  c.addEventListener('pointercancel', endDraw);
  c.addEventListener('pointerleave', endDraw);
})();

    els.textInputWrap.classList.remove('active');

  const layer = makeLayer({

      text,

});

function renderTextLayer(layer) {
  const ctx = layer.canvas.getContext('2d');
  ctx.clearRect(0, 0, layer.canvas.width, layer.canvas.height);
  const m = layer.meta;
  ctx.font = `${m.size}px ${m.font}`;
  ctx.fillStyle = m.color;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText(m.text, App.workW/2, App.workH/2);
}

    App.isPreviewActive = false;
    renderFull();
    pushHistoryDebounced(300);
  }
  opSlider.addEventListener('pointerup', commitOp);
  opSlider.addEventListener('pointercancel', commitOp);
  opSlider.addEventListener('input', () => {
    const v = +opSlider.value;
    layer.opacity = v / 100;
    opFill.style.width = v + '%';
    opLabel.textContent = v + '%';
    requestRender();
  });

  // Options menu
  row.querySelector('.layer-actions').addEventListener('click', e => {
    e.stopPropagation();
    showLayerOptionsMenu(e.currentTarget, layer);
  });

  // Drag to reorder
  setupLayerDragReorder(row, layer);

  return row;
}

function showLayerOptionsMenu(anchor, layer) {
  // close any existing
  document.querySelectorAll('.layer-options-menu').forEach(m => m.remove());
  const menu = document.createElement('div');
  menu.className = 'layer-options-menu';
  menu.innerHTML = `
    <button class="layer-option" data-act="duplicate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Duplicate
    </button>
    ${layer.locked ? '' : `
    <button class="layer-option danger" data-act="delete">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/></svg>
      Delete
    </button>
    `}
    <div class="layer-divider"></div>
    <div class="layer-blend-group">
      <label>Blend mode</label>
      <select data-blend>
        ${BLEND_MODES.map(b => `<option value="${b}" ${b===layer.blendMode?'selected':''}>${BLEND_LABELS[b]}</option>`).join('')}
      </select>
    </div>
  `;
  document.body.appendChild(menu);
  const r = anchor.getBoundingClientRect();
  let left = r.right - 200;
  let top = r.bottom + 4;
  if (top + menu.offsetHeight > window.innerHeight - 10) {
    top = r.top - menu.offsetHeight - 4;
  }
  if (left < 8) left = 8;
  menu.style.left = left + 'px';
  menu.style.top = top + 'px';

  function close() {
    menu.remove();
    document.removeEventListener('pointerdown', onDoc, true);
  }
  function onDoc(e) {
    if (!menu.contains(e.target)) close();
  }
  setTimeout(() => document.addEventListener('pointerdown', onDoc, true), 0);

  menu.querySelectorAll('[data-act]').forEach(b => {
    b.addEventListener('click', () => {
      const act = b.dataset.act;
      close();
      if (act === 'duplicate') {
        duplicateLayer(layer.id);
        renderFull();
        pushHistory();
        updateToolPanel();
        toast('Layer duplicated');
      } else if (act === 'delete') {
        removeLayer(layer.id);
        renderFull();
        pushHistory();
        updateToolPanel();
        toast('Layer deleted');
      }
    });
  });
  const sel = menu.querySelector('select[data-blend]');
  sel.addEventListener('change', () => {
    layer.blendMode = sel.value;
    renderFull();
    pushHistory();
  });
}

function setupLayerDragReorder(row, layer) {
  const grip = row.querySelector('.layer-grip');
  let dragging = false;
  let startY = 0;
  let startRowOffset = 0;
  let parent = null;

  grip.addEventListener('pointerdown', e => {
    e.preventDefault();
    e.stopPropagation();
    grip.setPointerCapture(e.pointerId);
    dragging = true;
    startY = e.clientY;
    parent = row.parentElement;
    startRowOffset = row.offsetTop;
    row.classList.add('dragging');
  });
  grip.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dy = e.clientY - startY;
    const rowH = row.offsetHeight + 6;
    const steps = Math.round(dy / rowH);
    if (steps === 0) return;
    // Compute target position in DOM
    const rows = [...parent.children];
    const myIdx = rows.indexOf(row);
    let newIdx = clamp(myIdx + steps, 0, rows.length - 1);
    if (newIdx === myIdx) return;
    // Move DOM node
    if (newIdx > myIdx) {
      parent.insertBefore(row, rows[newIdx].nextSibling);
    } else {
      parent.insertBefore(row, rows[newIdx]);
    }
    // Update App.layers: display order top->bottom = back-front reversed
    // i.e. layer at display position N from top = App.layers[App.layers.length - 1 - N]
    const fromLayerIdx = App.layers.length - 1 - myIdx;
    const toLayerIdx = App.layers.length - 1 - newIdx;
    reorderLayer(layer.id, toLayerIdx);
    // Reset baseline so steps continue working
    startY = e.clientY;
    renderFull();
  });
  function end() {
    if (!dragging) return;
    dragging = false;
    row.classList.remove('dragging');
    pushHistory();
  }
  grip.addEventListener('pointerup', end);
  grip.addEventListener('pointercancel', end);
}

function updateLayerThumbs() {
  document.querySelectorAll('.layer-row').forEach(row => {
    const id = +row.dataset.layerId;
    const layer = findLayer(id);
    if (!layer) return;
    const canvas = row.querySelector('.layer-thumb canvas');
    const tw = 36, th = 36;
    canvas.width = tw;
    canvas.height = th;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, tw, th);
    // Fit-draw the layer
    const sw = layer.canvas.width;
    const sh = layer.canvas.height;
    const k = Math.min(tw / sw, th / sh);
    const w = sw * k, h = sh * k;
    ctx.drawImage(layer.canvas, (tw - w)/2, (th - h)/2, w, h);
  });
}

/* ================================================================
   LAYER MOVE / SCALE / ROTATE ON CANVAS (non-background)
   Long-press on canvas to enter move mode? We'll allow it when activeTool === 'layers'
   ================================================================ */
(function setupLayerInteraction() {
  const wrap = els.canvasWrap;
  const pointers = new Map();
  let pinchStart = null;
  let dragStart = null;
  let layerStart = null;

  function getPt(e) {
    const r = els.canvasStage.getBoundingClientRect();
    return {
      x: ((e.clientX - r.left) / r.width) * App.workW,
      y: ((e.clientY - r.top) / r.height) * App.workH,
    };
  }
  function active() {
    const l = activeLayer();
    if (!l) return null;
    if (l.locked) return null; // can't move background
    return l;
  }
  function shouldHandle() {
    return App.activeTool === 'layers';
  }

  wrap.addEventListener('pointerdown', e => {
    if (!shouldHandle()) return;
    const l = active();
    if (!l) return;
    if (e.target.closest('button,input,select,.layer-row')) return;
    e.preventDefault();
    e.stopPropagation();
    wrap.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, getPt(e));
    if (pointers.size === 2) {
      const pts = [...pointers.values()];
      pinchStart = {
        dist: Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y),
        angle: Math.atan2(pts[1].y - pts[0].y, pts[1].x - pts[0].x),
        scale: l.scale,
        rot: l.rotation,
      };
    } else {
      dragStart = pointers.get(e.pointerId);
      layerStart = { x: l.x, y: l.y };
    }
  }, true);

  wrap.addEventListener('pointermove', e => {
    if (!shouldHandle()) return;
    const l = active();
    if (!l) return;
    if (!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, getPt(e));
    if (pointers.size === 2 && pinchStart) {
      const pts = [...pointers.values()];
      const dist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
      const angle = Math.atan2(pts[1].y - pts[0].y, pts[1].x - pts[0].x);
      const k = dist / pinchStart.dist;
      l.scale = clamp(pinchStart.scale * k, 0.1, 8);
      const dAng = (angle - pinchStart.angle) * 180 / Math.PI;
      l.rotation = pinchStart.rot + dAng;
      requestRender();
    } else if (pointers.size === 1 && dragStart) {
      const pt = pointers.get(e.pointerId);
      l.x = layerStart.x + (pt.x - dragStart.x);
      l.y = layerStart.y + (pt.y - dragStart.y);
      requestRender();
    }
  }, true);

  function end(e) {
    if (pointers.size === 2) pinchStart = null;
    pointers.delete(e.pointerId);
    if (pointers.size === 0) {
      if (dragStart || pinchStart) pushHistory();
      dragStart = null;
      pinchStart = null;
    }
  }
  wrap.addEventListener('pointerup', end, true);
  wrap.addEventListener('pointercancel', end, true);
})();

/* ================================================================
   MENU SHEET
   ================================================================ */
els.menuBtn.addEventListener('click', () => els.menuSheet.classList.add('active'));
els.menuSheet.addEventListener('click', e => {
  if (e.target === els.menuSheet) els.menuSheet.classList.remove('active');
});
document.querySelectorAll('.sheet [data-action]').forEach(b => {
  b.addEventListener('click', () => {
    const a = b.dataset.action;
    els.menuSheet.classList.remove('active');
    if (a === 'openFile') openFilePicker();
    else if (a === 'paste') pasteFromClipboard();
    else if (a === 'autoEnhance') autoEnhance();
    else if (a === 'bake') doBake();
    else if (a === 'copyToClipboard') doCopyClipboard();
    else if (a === 'share') doShare();
    else if (a === 'discard') {
      App.layers = [];
      App.activeLayerId = null;
      App.history = [];
      App.historyIndex = -1;
      els.welcome.classList.remove('hidden');
    }
  });
});

function autoEnhance() {
  if (!App.layers.length) return;
  App.adjustments.brightness = 8;
  App.adjustments.contrast = 12;
  App.adjustments.saturation = 14;
  App.adjustments.vibrance = 18;
  App.adjustments.shadows = 12;
  App.adjustments.highlights = -8;
  App.adjustments.clarity = 16;
  App.adjustments.sharpness = 20;
  renderFull();
  updateToolPanel();
  pushHistory();
  toast('Auto enhance applied', 'success');
}

/* Bake: flatten everything to a new base image, reset all state. */
function doBake() {
  if (!App.layers.length) return;
  loading(true, 'Baking…');
  setTimeout(() => {
    // The current rendered canvas already contains the full composite.
    const flat = document.createElement('canvas');
    flat.width = App.workW;
    flat.height = App.workH;
    flat.getContext('2d').drawImage(App.canvas, 0, 0);
    rebuildFromImageCanvas(flat);
    loading(false);
    toast('Layers baked', 'success');
  }, 30);
}

/* ================================================================
   WELCOME SCREEN ACTIONS
   ================================================================ */
els.welcomeOpenBtn.addEventListener('click', openFilePicker);
els.welcomeCameraBtn.addEventListener('click', openCamera);
els.welcomePasteBtn.addEventListener('click', pasteFromClipboard);

(function buildSamples() {
  const samples = [
    { bg:['#0f766e','#2dd4bf'], shapes:[{type:'circle',x:.3,y:.4,r:.2,c:'#fff'}] },
    { bg:['#f59e0b','#dc2626'], shapes:[{type:'circle',x:.5,y:.7,r:.15,c:'rgba(255,255,255,.5)'},{type:'rect',x:.2,y:.2,w:.3,h:.3,c:'#fff'}] },
    { bg:['#10b981','#14b8a6'], shapes:[{type:'triangle',x:.5,y:.6,s:.3,c:'#fff'}] },
    { bg:['#0f766e','#0d9488'], shapes:[{type:'circle',x:.5,y:.5,r:.25,c:'rgba(255,255,255,.5)'}] },
  ];
  samples.forEach((s) => {
    const tile = document.createElement('button');
    tile.className = 'sample-tile';
    const c = document.createElement('canvas');
    c.width = 200; c.height = 200;
    const ctx = c.getContext('2d');
    const grad = ctx.createLinearGradient(0,0,200,200);
    grad.addColorStop(0, s.bg[0]);
    grad.addColorStop(1, s.bg[1]);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 200, 200);
    for (const sh of (s.shapes||[])) {
      ctx.fillStyle = sh.c;
      if (sh.type === 'circle') {
        ctx.beginPath();
        ctx.arc(sh.x*200, sh.y*200, sh.r*200, 0, Math.PI*2);
        ctx.fill();
      } else if (sh.type === 'rect') {
        ctx.fillRect(sh.x*200, sh.y*200, sh.w*200, sh.h*200);
      } else if (sh.type === 'triangle') {
        const x = sh.x*200, y = sh.y*200, s2 = sh.s*200;
        ctx.beginPath();
        ctx.moveTo(x, y - s2);
        ctx.lineTo(x - s2, y + s2/2);
        ctx.lineTo(x + s2, y + s2/2);
        ctx.closePath();
        ctx.fill();
      }
    }
    tile.appendChild(c);
    tile.addEventListener('click', () => loadImageFromSource(c.toDataURL(), false));
    els.sampleGrid.appendChild(tile);
  });
})();

/* ================================================================
   EXPORT
   ================================================================ */
let exportFormat = 'png';
let exportQuality = 0.95;

els.exportBtn.addEventListener('click', () => {
  if (!App.layers.length) { toast('Open a photo first', 'error'); return; }
  els.exportModal.classList.add('active');
  updateQualityVisibility();
});
els.exportClose.addEventListener('click', () => els.exportModal.classList.remove('active'));
els.exportModal.addEventListener('click', e => {
  if (e.target === els.exportModal) els.exportModal.classList.remove('active');
});
document.querySelectorAll('.format-tile').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.format-tile').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    exportFormat = t.dataset.format;
    updateQualityVisibility();
  });
});
function updateQualityVisibility() {
  els.qualityRow.style.display = exportFormat === 'png' ? 'none' : 'flex';
}
els.qualitySlider.addEventListener('input', () => {
  const v = +els.qualitySlider.value;
  exportQuality = v / 100;
  els.qualityVal.textContent = v + '%';
  els.qualityFill.style.width = v + '%';
});

async function buildExportBlob() {
  // Use the current composite at working resolution.
  // (Agent 4 will upgrade to true full-res export.)
  const out = document.createElement('canvas');
  out.width = App.workW;
  out.height = App.workH;
  out.getContext('2d').drawImage(App.canvas, 0, 0);
  const mimeMap = { png: 'image/png', jpeg: 'image/jpeg', webp: 'image/webp' };
  const mime = mimeMap[exportFormat] || 'image/png';
  return new Promise(resolve => {
    out.toBlob(blob => resolve({ blob, mime }), mime, exportFormat === 'png' ? undefined : exportQuality);
  });
}

els.exportDownload.addEventListener('click', async () => {
  loading(true, 'Exporting…');
  try {
    const { blob } = await buildExportBlob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `studio-${Date.now()}.${exportFormat === 'jpeg' ? 'jpg' : exportFormat}`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    loading(false);
    els.exportModal.classList.remove('active');
    toast('Saved', 'success');
  } catch (e) {
    loading(false);
    toast('Export failed', 'error');
    console.error(e);
  }
});

els.exportCopy.addEventListener('click', async () => {
  loading(true, 'Copying…');
  try {
    const { blob } = await buildExportBlob();
    if (!navigator.clipboard?.write) {
      loading(false);
      toast('Clipboard not supported here', 'error');
      return;
    }
    let finalBlob = blob;
    if (exportFormat !== 'png') {
      finalBlob = await new Promise(r => {
        const c = document.createElement('canvas');
        const img = new Image();
        img.onload = () => {
          c.width = img.width; c.height = img.height;
          c.getContext('2d').drawImage(img, 0, 0);
          c.toBlob(b => r(b), 'image/png');
        };
        img.src = URL.createObjectURL(blob);
      });
    }
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': finalBlob })]);
    loading(false);
    els.exportModal.classList.remove('active');
    toast('Copied to clipboard', 'success');
  } catch (e) {
    loading(false);
    toast('Copy failed', 'error');
  }
});

els.exportShare.addEventListener('click', async () => {
  if (!navigator.share || !navigator.canShare) {
    toast('Share not supported here', 'error');
    return;
  }
  loading(true, 'Preparing share…');
  try {
    const { blob } = await buildExportBlob();
    const ext = exportFormat === 'jpeg' ? 'jpg' : exportFormat;
    const file = new File([blob], `studio-${Date.now()}.${ext}`, { type: blob.type });
    if (navigator.canShare({ files: [file] })) {
      loading(false);
      els.exportModal.classList.remove('active');
      await navigator.share({ files: [file], title: 'Studio Export' });
    } else {
      loading(false);
      toast('Cannot share this file', 'error');
    }
  } catch (e) {
    loading(false);
    if (e.name !== 'AbortError') toast('Share canceled', 'error');
  }
});

async function doCopyClipboard() {
  if (!App.layers.length) return;
  loading(true, 'Copying…');
  try {
    const oldFormat = exportFormat;
    exportFormat = 'png';
    const { blob } = await buildExportBlob();
    exportFormat = oldFormat;
    if (!navigator.clipboard?.write) {
      loading(false);
      toast('Clipboard not supported', 'error');
      return;
    }
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    loading(false);
    toast('Copied to clipboard', 'success');
  } catch (e) {
    loading(false);
    toast('Copy failed', 'error');
  }
}

async function doShare() {
  if (!App.layers.length) return;
  if (!navigator.share) { toast('Share not supported', 'error'); return; }
  loading(true, 'Preparing…');
  try {
    const oldFormat = exportFormat;
    exportFormat = 'jpeg';
    const { blob } = await buildExportBlob();
    exportFormat = oldFormat;
    const file = new File([blob], `studio-${Date.now()}.jpg`, { type: 'image/jpeg' });
    loading(false);
    if (navigator.canShare?.({ files: [file] })) {
      await navigator.share({ files: [file], title: 'Studio Export' });
    } else {
      toast('Cannot share file', 'error');
    }
  } catch (e) {
    loading(false);
    if (e.name !== 'AbortError') toast('Share canceled');
  }
}

/* ================================================================
   KEYBOARD SHORTCUTS
   ================================================================ */
document.addEventListener('keydown', e => {
  if (e.target.matches('input,textarea,select')) return;
  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  else if ((e.metaKey || e.ctrlKey) && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) { e.preventDefault(); redo(); }
  else if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); els.exportBtn.click(); }
  else if ((e.metaKey || e.ctrlKey) && e.key === 'c') { e.preventDefault(); doCopyClipboard(); }
});

/* Prevent iOS gesture defaults */
['gesturestart','gesturechange','gestureend'].forEach(ev => {
  document.addEventListener(ev, e => e.preventDefault());
});

/* ================================================================
   INIT
   ================================================================ */
updateToolPanel();

</script>
