<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#fafaf7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Studio · Photo Editor</title>

<!-- IBM Plex Sans -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#0f766e;     /* teal */
  --accent:#14b8a6;
  --highlight:#2dd4bf;

  /* Light theme (default) */
  --bg:#fafaf7;
  --bg-2:#f1f1ec;
  --surface:#ffffff;
  --surface-2:#f6f6f1;
  --elevated:#ffffff;
  --border:rgba(20,20,20,.10);
  --border-strong:rgba(20,20,20,.18);
  --text:#161716;
  --text-2:#5e605c;
  --text-3:#9a9c98;
  --modal-bg:rgba(20,20,20,.45);
  --shadow:0 1px 1px rgba(0,0,0,.03),0 10px 25px rgba(0,0,0,.06);
  --shadow-lg:0 30px 80px -20px rgba(0,0,0,.18);
  --canvas-bg:#f1f1ec;
  --checker-a:#ededdd;
  --checker-b:#fafaf7;
  --danger:#dc2626;
  --success:#0d9488;

  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
  --topbar-h:52px;
  --bottombar-h:64px;
  --radius-sm:8px;
  --radius:12px;
  --radius-lg:18px;
}
[data-theme="dark"]{
  --bg:#0f0f0e;
  --bg-2:#161614;
  --surface:#1a1a18;
  --surface-2:#222220;
  --elevated:#262624;
  --border:rgba(246,246,244,.10);
  --border-strong:rgba(246,246,244,.20);
  --text:#f6f6f4;
  --text-2:#a8a8a4;
  --text-3:#6a6a65;
  --modal-bg:rgba(0,0,0,.55);
  --shadow:0 1px 1px rgba(0,0,0,.25),0 10px 25px rgba(0,0,0,.35);
  --shadow-lg:0 30px 80px -20px rgba(0,0,0,.6);
  --canvas-bg:#0a0a09;
  --checker-a:#1a1a18;
  --checker-b:#222220;
}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:"IBM Plex Sans",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:14px;line-height:1.4;
  -webkit-font-smoothing:antialiased;
  -webkit-user-select:none;user-select:none;
  overscroll-behavior:none;
  touch-action:manipulation;
  transition:background .25s ease,color .25s ease;
}
body{display:flex;flex-direction:column;height:100dvh;}
input,button,select,textarea{font-family:inherit;font-size:inherit;color:inherit;}
button{background:none;border:none;cursor:pointer;color:inherit;}
img{display:block;max-width:100%;}
a{color:var(--primary);}

::selection{background-color:color-mix(in srgb,var(--primary) 30%,white);color:var(--primary);}
::-moz-selection{background-color:color-mix(in srgb,var(--primary) 30%,white);color:var(--primary);}

/* ---------- WELCOME SCREEN ---------- */
.welcome{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(var(--safe-t) + 32px) 24px calc(var(--safe-b) + 32px);
  background:var(--bg);
  animation:fadeIn .35s ease;
}
.welcome.hidden{display:none;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.welcome-logo{
  width:88px;height:88px;border-radius:22px;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 16px 40px -10px color-mix(in srgb,var(--primary) 50%,transparent);
  margin-bottom:24px;
  animation:slideUp .5s .05s both ease-out;
}
.welcome-logo svg{width:48px;height:48px;color:#fff;}
.welcome-title{
  font-size:38px;font-weight:800;letter-spacing:.2rem;
  color:var(--primary);text-transform:uppercase;
  margin-bottom:6px;animation:slideUp .5s .15s both ease-out;
  font-variant:small-caps;
}
.welcome-sub{
  font-size:15px;color:var(--text-2);text-align:center;max-width:340px;
  margin-bottom:30px;animation:slideUp .5s .25s both ease-out;
}
.welcome-actions{
  display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;
  animation:slideUp .5s .35s both ease-out;
}
.welcome-btn{
  display:flex;align-items:center;gap:14px;padding:16px 20px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  font-size:15px;font-weight:600;letter-spacing:-.15px;
  transition:transform .12s,background .15s,border-color .15s;
  color:var(--text);
}
.welcome-btn:active{transform:scale(.97);background:var(--surface-2);}
.welcome-btn:hover{border-color:color-mix(in srgb,var(--primary) 35%,var(--border));}
.welcome-btn.primary{
  background:var(--primary);
  border-color:var(--primary);
  color:#fff;
  box-shadow:0 8px 24px -8px color-mix(in srgb,var(--primary) 55%,transparent);
}
.welcome-btn.primary:active{background:color-mix(in srgb,var(--primary) 88%,black);}
.welcome-btn-icon{
  width:36px;height:36px;border-radius:10px;
  background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--text-2);
}
.welcome-btn.primary .welcome-btn-icon{background:rgba(255,255,255,0.16);color:#fff;}
.welcome-btn-icon svg{width:18px;height:18px;}
.welcome-btn-text{display:flex;flex-direction:column;align-items:flex-start;gap:2px;}
.welcome-btn-sub{font-size:11px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;}
.welcome-btn.primary .welcome-btn-sub{color:rgba(255,255,255,0.85);}

.welcome-samples{
  margin-top:24px;width:100%;max-width:340px;
  animation:slideUp .5s .45s both ease-out;
}
.welcome-samples-label{
  font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;
  text-align:center;margin-bottom:10px;
}
.sample-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
}
.sample-tile{
  aspect-ratio:1;border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  overflow:hidden;cursor:pointer;
  transition:transform .12s,border-color .15s;
}
.sample-tile:active{transform:scale(.94);}
.sample-tile:hover{border-color:var(--primary);}
.sample-tile canvas{width:100%;height:100%;display:block;}
.welcome-theme-btn{
  position:absolute;top:calc(var(--safe-t) + 12px);right:14px;
  width:38px;height:38px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text);
  transition:background .15s,border-color .15s;
}
.welcome-theme-btn:hover{border-color:var(--primary);}
.welcome-theme-btn svg{width:18px;height:18px;}

.welcome-footer{
  position:absolute;bottom:calc(var(--safe-b) + 14px);left:0;right:0;
  text-align:center;font-size:11px;color:var(--text-3);
}

/* ---------- TOP BAR ---------- */
.topbar{
  height:var(--topbar-h);
  padding:0 8px;
  padding-top:var(--safe-t);
  background:color-mix(in srgb,var(--bg) 88%,transparent);
  backdrop-filter:saturate(160%) blur(20px);
  -webkit-backdrop-filter:saturate(160%) blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:2px;
  position:relative;z-index:50;flex-shrink:0;
}
.tb-btn{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text);
  transition:background .15s,transform .12s;
  flex-shrink:0;
}
.tb-btn:hover{background:var(--surface-2);}
.tb-btn:active{background:var(--surface-2);transform:scale(.92);}
.tb-btn:disabled{opacity:.28;pointer-events:none;}
.tb-btn svg{width:20px;height:20px;}
.tb-title{
  flex:1;text-align:center;font-weight:700;font-size:14px;letter-spacing:.3px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  color:var(--text);min-width:0;
}
.tb-title-dot{
  width:6px;height:6px;border-radius:50%;background:var(--primary);
}
.tb-btn.export{
  width:auto;padding:0 14px;height:36px;
  background:var(--primary);
  color:#fff;font-weight:600;font-size:13px;gap:6px;
  margin:0 4px;border-radius:10px;
}
.tb-btn.export:hover{background:color-mix(in srgb,var(--primary) 88%,black);}
.tb-btn.export:active{transform:scale(.95);}
.tb-btn.export svg{width:16px;height:16px;}

/* ---------- CANVAS AREA ---------- */
.canvas-wrap{
  flex:1;position:relative;overflow:hidden;
  background:var(--canvas-bg);
  display:flex;align-items:center;justify-content:center;
  touch-action:none;
}
.canvas-stage{
  position:relative;
  transform-origin:center center;
  transition:transform .25s cubic-bezier(.2,.8,.2,1);
  will-change:transform;
}
.canvas-stage.dragging{transition:none;}
#mainCanvas{
  display:block;position:relative;
  border-radius:4px;
  box-shadow:var(--shadow-lg);
  touch-action:none;
}
#interactCanvas{
  display:block;position:absolute;top:0;left:0;
  pointer-events:none;
  touch-action:none;
}
#interactCanvas.active{pointer-events:auto;}
#cropOverlay{
  position:absolute;top:0;left:0;pointer-events:none;
  display:none;
}
#cropOverlay.active{display:block;pointer-events:auto;}

/* checkerboard for transparency */
.canvas-stage.has-trans #mainCanvas{
  background-image:
    linear-gradient(45deg,var(--checker-a) 25%,transparent 25%),
    linear-gradient(-45deg,var(--checker-a) 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,var(--checker-a) 75%),
    linear-gradient(-45deg,transparent 75%,var(--checker-a) 75%);
  background-size:20px 20px;
  background-position:0 0,0 10px,10px -10px,-10px 0px;
  background-color:var(--checker-b);
}

/* Zoom indicator + Fit button */
.canvas-hud{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;align-items:center;z-index:10;
  pointer-events:none;
}
.zoom-indicator{
  background:color-mix(in srgb,var(--surface) 92%,transparent);
  backdrop-filter:blur(10px);
  border:1px solid var(--border);
  padding:4px 12px;border-radius:20px;
  font-size:11px;font-weight:600;
  color:var(--text-2);
  opacity:0;transition:opacity .2s;
  pointer-events:none;
}
.zoom-indicator.show{opacity:1;}
.fit-btn{
  background:color-mix(in srgb,var(--surface) 92%,transparent);
  backdrop-filter:blur(10px);
  border:1px solid var(--border);
  width:34px;height:30px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-2);pointer-events:auto;
  transition:color .15s,border-color .15s,background .15s;
}
.fit-btn:hover{color:var(--primary);border-color:var(--primary);}
.fit-btn:active{transform:scale(.92);}
.fit-btn svg{width:14px;height:14px;}

.compare-hint{
  position:absolute;top:10px;right:10px;
  background:color-mix(in srgb,var(--surface) 92%,transparent);
  backdrop-filter:blur(10px);
  border:1px solid var(--border);
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  z-index:10;color:var(--text-2);
}
.compare-hint svg{width:18px;height:18px;}
.compare-hint.active{color:var(--primary);background:color-mix(in srgb,var(--primary) 18%,transparent);border-color:var(--primary);}

/* ---------- CONTROL PANEL ---------- */
.control-panel{
  background:color-mix(in srgb,var(--bg-2) 92%,transparent);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--border);
  flex-shrink:0;position:relative;z-index:30;
  max-height:60dvh;
  display:flex;flex-direction:column;
  min-width:0;
}
.control-panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 4px;gap:8px;
}
.cp-title{
  font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  color:var(--text-2);
  display:flex;align-items:center;gap:8px;
  min-width:0;overflow:hidden;
}
.cp-title-val{
  font-size:12px;font-weight:700;color:var(--text);
  letter-spacing:0;text-transform:none;
  background:var(--surface-2);
  padding:2px 8px;border-radius:6px;min-width:36px;text-align:center;
  border:1px solid var(--border);
}
.cp-actions{display:flex;gap:4px;flex-shrink:0;}
.cp-action{
  padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;
  color:var(--text-2);background:var(--surface-2);
  border:1px solid var(--border);
  transition:all .15s;
}
.cp-action:hover{border-color:var(--primary);color:var(--text);}
.cp-action:active{transform:scale(.94);}
.cp-action.primary{
  background:var(--primary);color:#fff;border-color:var(--primary);
}
.cp-action.primary:hover{background:color-mix(in srgb,var(--primary) 88%,black);}

.control-body{
  padding:4px 14px 12px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  flex:1;min-width:0;
}

/* slider */
.slider-row{
  display:flex;align-items:center;gap:10px;
  padding:6px 0;
}
.slider-track{
  flex:1;height:36px;position:relative;
  display:flex;align-items:center;
  min-width:0;
  touch-action:none;
}
.slider-track::before{
  content:"";position:absolute;left:0;right:0;height:3px;top:50%;transform:translateY(-50%);
  background:var(--surface-2);border-radius:2px;
  border:1px solid var(--border);
}
.slider-fill{
  position:absolute;height:3px;top:50%;transform:translateY(-50%);
  background:var(--primary);border-radius:2px;pointer-events:none;
}
.slider-fill.bipolar{background:var(--primary);}
.slider-track input[type=range]{
  position:absolute;width:100%;height:100%;
  appearance:none;background:transparent;
  -webkit-appearance:none;-moz-appearance:none;
  margin:0;padding:0;
  touch-action:none;
}
.slider-track input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:22px;height:22px;border-radius:50%;
  background:var(--surface);
  border:2px solid var(--primary);
  box-shadow:0 1px 4px rgba(0,0,0,0.18);
  cursor:pointer;transition:transform .12s;
}
.slider-track input[type=range]:active::-webkit-slider-thumb{
  transform:scale(1.18);
}
.slider-track input[type=range]::-moz-range-thumb{
  width:22px;height:22px;border-radius:50%;background:var(--surface);
  border:2px solid var(--primary);box-shadow:0 1px 4px rgba(0,0,0,0.18);
  cursor:pointer;
}
.slider-track .mid-mark{
  position:absolute;left:50%;width:1px;height:8px;background:var(--text-3);
  top:50%;transform:translate(-50%,-50%);opacity:.6;pointer-events:none;
}
.slider-label{
  font-size:11px;text-transform:uppercase;letter-spacing:.4px;font-weight:600;
  color:var(--text-2);min-width:74px;
}
.slider-value{
  font-size:12px;font-weight:600;color:var(--text);
  min-width:42px;text-align:right;font-variant-numeric:tabular-nums;
}

/* ---------- HORIZONTAL SCROLLERS (filter/effect/adjust rows) ---------- */
.h-scroll{
  display:flex;gap:10px;overflow-x:auto;overflow-y:hidden;
  padding:4px 0 8px;
  scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent;
  -webkit-overflow-scrolling:touch;
  min-width:0;
  flex-shrink:0;
}
.h-scroll::-webkit-scrollbar{height:6px;}
.h-scroll::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px;}
.h-scroll::-webkit-scrollbar-track{background:transparent;}
.h-scroll>*{flex-shrink:0;}

/* ---------- ADJUSTMENT TILES ---------- */
.adjust-tile{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:8px 6px;width:66px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  font-size:10px;font-weight:600;color:var(--text-2);
  text-transform:uppercase;letter-spacing:.3px;
  transition:all .15s;position:relative;
}
.adjust-tile:hover{border-color:color-mix(in srgb,var(--primary) 35%,var(--border));}
.adjust-tile:active{transform:scale(.94);}
.adjust-tile.active{
  border-color:var(--primary);
  background:color-mix(in srgb,var(--primary) 12%,var(--surface));
  color:var(--text);
}
.adjust-tile-icon{
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
}
.adjust-tile-icon svg{width:20px;height:20px;}
.adjust-tile-badge{
  position:absolute;top:4px;right:4px;
  font-size:9px;font-weight:700;
  background:var(--primary);color:#fff;
  padding:1px 5px;border-radius:8px;
  min-width:16px;text-align:center;line-height:1.4;
}

/* ---------- FILTER TILES ---------- */
.filter-tile{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  width:66px;
}
.filter-thumb{
  width:64px;height:64px;border-radius:var(--radius);
  overflow:hidden;
  border:2px solid transparent;
  background:var(--surface-2);
  position:relative;
  transition:all .15s;
}
.filter-tile:active .filter-thumb{transform:scale(.94);}
.filter-tile.active .filter-thumb{
  border-color:var(--primary);
}
.filter-thumb canvas,.filter-thumb img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.filter-tile-label{
  font-size:10.5px;font-weight:600;color:var(--text-2);
  text-align:center;letter-spacing:.2px;
}
.filter-tile.active .filter-tile-label{color:var(--text);}

/* ---------- CROP CONTROLS ---------- */
.crop-chip{
  padding:8px 14px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);
  font-size:12px;font-weight:600;color:var(--text-2);
  display:flex;align-items:center;gap:6px;
  white-space:nowrap;
}
.crop-chip:hover{border-color:color-mix(in srgb,var(--primary) 35%,var(--border));}
.crop-chip:active{transform:scale(.95);}
.crop-chip.active{
  background:color-mix(in srgb,var(--primary) 12%,var(--surface));
  border-color:var(--primary);color:var(--text);
}

/* crop overlay */
.crop-frame{
  position:absolute;
  border:1px solid #fff;
  box-shadow:0 0 0 9999px rgba(0,0,0,0.5);
}
.crop-grid-line{
  position:absolute;background:rgba(255,255,255,0.4);
}
.crop-handle{
  position:absolute;width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
}
.crop-handle::before{
  content:"";width:12px;height:12px;border:2px solid #fff;
  background:var(--primary);border-radius:50%;
}
.crop-handle.tl{top:-12px;left:-12px;cursor:nwse-resize;}
.crop-handle.tr{top:-12px;right:-12px;cursor:nesw-resize;}
.crop-handle.bl{bottom:-12px;left:-12px;cursor:nesw-resize;}
.crop-handle.br{bottom:-12px;right:-12px;cursor:nwse-resize;}

/* transform buttons */
.transform-buttons{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  margin-top:6px;
}
.tx-btn{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 4px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-size:11px;font-weight:600;color:var(--text-2);
  transition:all .15s;
}
.tx-btn:hover{border-color:var(--primary);color:var(--text);}
.tx-btn:active{transform:scale(.95);}
.tx-btn svg{width:20px;height:20px;}

/* ---------- TOOL TABS ---------- */
.tool-bar{
  height:var(--bottombar-h);
  padding-bottom:var(--safe-b);
  background:color-mix(in srgb,var(--bg) 94%,transparent);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;
  flex-shrink:0;position:relative;z-index:40;
  overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;
}
.tool-bar::-webkit-scrollbar{display:none;}
.tool-tab{
  flex:1;min-width:64px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:8px 4px;
  color:var(--text-3);
  font-size:10px;font-weight:600;letter-spacing:.2px;
  transition:color .15s;position:relative;
  flex-shrink:0;
}
.tool-tab svg{width:22px;height:22px;}
.tool-tab:hover{color:var(--text-2);}
.tool-tab.active{color:var(--primary);}
.tool-tab.active::before{
  content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:28px;height:2px;border-radius:0 0 2px 2px;
  background:var(--primary);
}
.tool-tab:active{opacity:.7;}

/* ---------- DRAW PANEL ---------- */
.draw-row{display:flex;gap:8px;align-items:center;padding:4px 0;}
.draw-tools{display:flex;gap:6px;flex-shrink:0;}
.draw-tool-btn{
  width:42px;height:42px;border-radius:11px;
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--text-2);
  transition:all .15s;
}
.draw-tool-btn:hover{border-color:var(--primary);color:var(--text);}
.draw-tool-btn:active{transform:scale(.92);}
.draw-tool-btn.active{
  background:color-mix(in srgb,var(--primary) 14%,var(--surface));
  border-color:var(--primary);color:var(--primary);
}
.draw-tool-btn svg{width:18px;height:18px;}
.color-row{
  display:flex;gap:8px;overflow-x:auto;
  padding:6px 0;
  scrollbar-width:none;
}
.color-row::-webkit-scrollbar{display:none;}
.color-swatch{
  flex-shrink:0;width:34px;height:34px;border-radius:50%;
  border:2px solid var(--border);
  position:relative;
  transition:transform .12s,border-color .15s;
}
.color-swatch:active{transform:scale(.9);}
.color-swatch.active{
  border-color:var(--primary);box-shadow:0 0 0 2px color-mix(in srgb,var(--primary) 40%,transparent);
}
.color-swatch.custom{
  background:conic-gradient(from 0deg,red,orange,yellow,green,blue,indigo,violet,red);
}
.color-swatch.custom input{
  position:absolute;inset:0;opacity:0;cursor:pointer;
}
.draw-toggle{
  display:flex;align-items:center;gap:6px;padding:6px 10px;
  border-radius:9px;background:var(--surface);border:1px solid var(--border);
  font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.4px;
  transition:all .15s;
}
.draw-toggle:hover{border-color:var(--primary);}
.draw-toggle.on{background:color-mix(in srgb,var(--primary) 14%,var(--surface));border-color:var(--primary);color:var(--primary);}

/* ---------- LAYERS PANEL ---------- */
.layers-actions{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:4px 0 10px;
}
.layers-add-btn{
  padding:10px 8px;border-radius:11px;
  background:var(--surface);border:1px solid var(--border);
  font-size:12px;font-weight:600;color:var(--text);
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .15s;
}
.layers-add-btn:hover{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 8%,var(--surface));}
.layers-add-btn:active{transform:scale(.96);}
.layers-add-btn svg{width:14px;height:14px;}

.layer-list{display:flex;flex-direction:column;gap:6px;}
.layer-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:11px;
  transition:border-color .15s,background .15s;
  touch-action:none;
}
.layer-row.active{
  border-color:var(--primary);
  background:color-mix(in srgb,var(--primary) 8%,var(--surface));
}
.layer-row.dragging{opacity:.6;}
.layer-eye{
  flex-shrink:0;width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-2);
  transition:color .15s,background .15s;
}
.layer-eye:hover{color:var(--text);background:var(--surface-2);}
.layer-eye.hidden{color:var(--text-3);}
.layer-eye svg{width:16px;height:16px;}
.layer-thumb{
  flex-shrink:0;width:36px;height:36px;border-radius:7px;
  background:var(--surface-2);border:1px solid var(--border);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  background-image:
    linear-gradient(45deg,var(--checker-a) 25%,transparent 25%),
    linear-gradient(-45deg,var(--checker-a) 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,var(--checker-a) 75%),
    linear-gradient(-45deg,transparent 75%,var(--checker-a) 75%);
  background-size:8px 8px;
  background-position:0 0,0 4px,4px -4px,-4px 0px;
}
.layer-thumb canvas{width:100%;height:100%;display:block;object-fit:contain;}
.layer-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
.layer-name{
  font-size:13px;font-weight:600;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  background:transparent;border:none;outline:none;
  width:100%;padding:1px 2px;border-radius:4px;
}
.layer-name:focus{background:var(--surface-2);outline:1px solid var(--primary);}
.layer-meta-row{
  display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text-3);
}
.layer-opacity{
  flex:1;height:14px;position:relative;display:flex;align-items:center;min-width:60px;
}
.layer-opacity::before{
  content:"";position:absolute;left:0;right:0;height:2px;background:var(--border-strong);border-radius:1px;
}
.layer-opacity .fill{
  position:absolute;height:2px;left:0;background:var(--primary);border-radius:1px;
}
.layer-opacity input{
  position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;
}
.layer-actions{
  flex-shrink:0;width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;color:var(--text-2);
  transition:color .15s,background .15s;
}
.layer-actions:hover{color:var(--text);background:var(--surface-2);}
.layer-actions svg{width:16px;height:16px;}
.layer-grip{
  flex-shrink:0;width:14px;height:24px;
  display:flex;align-items:center;justify-content:center;color:var(--text-3);
  cursor:grab;touch-action:none;
}
.layer-grip:active{cursor:grabbing;}
.layer-grip svg{width:12px;height:14px;}

/* layer options popup */
.layer-options-menu{
  position:absolute;
  background:var(--surface);border:1px solid var(--border-strong);
  border-radius:12px;box-shadow:var(--shadow-lg);
  padding:6px;min-width:180px;z-index:120;
  display:flex;flex-direction:column;gap:2px;
  animation:fadeIn .15s ease;
}
.layer-option{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:8px;
  font-size:13px;font-weight:500;color:var(--text);
  transition:background .12s;text-align:left;width:100%;
}
.layer-option:hover{background:var(--surface-2);}
.layer-option.danger{color:var(--danger);}
.layer-option svg{width:15px;height:15px;color:var(--text-2);flex-shrink:0;}
.layer-option.danger svg{color:var(--danger);}
.layer-divider{height:1px;background:var(--border);margin:4px 6px;}
.layer-blend-group{
  display:flex;flex-direction:column;padding:6px 10px;gap:4px;
}
.layer-blend-group label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.layer-blend-group select{
  width:100%;padding:6px 8px;border-radius:7px;
  background:var(--surface-2);border:1px solid var(--border);
  color:var(--text);font-size:13px;font-weight:500;outline:none;
}
.layer-blend-group select:focus{border-color:var(--primary);}

/* ---------- TEXT INPUT MODAL ---------- */
.text-input-wrap{
  position:fixed;inset:0;z-index:150;
  background:var(--modal-bg);backdrop-filter:blur(8px);
  display:none;align-items:flex-end;
  padding:calc(var(--safe-t) + 16px) 16px calc(var(--safe-b) + 16px);
}
.text-input-wrap.active{display:flex;}
.text-input-card{
  width:100%;background:var(--surface);
  border-radius:20px;padding:18px;
  border:1px solid var(--border);
  display:flex;flex-direction:column;gap:14px;
  box-shadow:var(--shadow-lg);
}
.text-input{
  width:100%;min-height:60px;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:12px;padding:12px;color:var(--text);
  font-size:16px;line-height:1.4;
  resize:none;outline:none;
  font-family:inherit;
}
.text-input:focus{border-color:var(--primary);}
.text-options{display:flex;gap:8px;flex-wrap:wrap;}
.text-opt-group{display:flex;gap:6px;align-items:center;}
.text-opt-label{font-size:11px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.font-select,.size-input{
  background:var(--surface-2);border:1px solid var(--border);
  color:var(--text);padding:6px 10px;border-radius:8px;
  font-size:13px;font-weight:500;outline:none;
  font-family:inherit;
}
.font-select:focus,.size-input:focus{border-color:var(--primary);}
.text-actions{display:flex;gap:10px;justify-content:flex-end;}
.btn{
  padding:9px 16px;border-radius:10px;font-weight:600;font-size:14px;
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
}
.btn:hover{border-color:var(--primary);}
.btn:active{transform:scale(.95);}
.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff;}
.btn.primary:hover{background:color-mix(in srgb,var(--primary) 88%,black);}

/* ---------- EXPORT MODAL ---------- */
.modal{
  position:fixed;inset:0;z-index:160;
  display:none;align-items:center;justify-content:center;
  background:var(--modal-bg);backdrop-filter:blur(10px);
  padding:24px;
  animation:fadeIn .2s ease;
}
.modal.active{display:flex;}
.modal-card{
  width:100%;max-width:380px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:22px;
  overflow:hidden;position:relative;
  box-shadow:var(--shadow-lg);
  animation:slideUp .3s cubic-bezier(.2,.8,.2,1);
}
.modal-header{padding:18px 20px 6px;}
.modal-title{font-size:18px;font-weight:700;letter-spacing:-.3px;color:var(--text);}
.modal-sub{font-size:13px;color:var(--text-2);margin-top:2px;}
.modal-body{padding:14px 20px 18px;display:flex;flex-direction:column;gap:14px;}
.format-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.format-tile{
  padding:14px 8px;
  border-radius:12px;
  background:var(--surface-2);border:1.5px solid var(--border);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-size:11px;font-weight:600;color:var(--text-2);
  text-transform:uppercase;letter-spacing:.4px;
  transition:all .15s;
}
.format-tile:hover{border-color:color-mix(in srgb,var(--primary) 40%,var(--border));}
.format-tile:active{transform:scale(.96);}
.format-tile.active{
  background:color-mix(in srgb,var(--primary) 12%,var(--surface));
  border-color:var(--primary);color:var(--text);
}
.format-tile-name{font-size:15px;font-weight:700;letter-spacing:0;text-transform:none;color:var(--text);}
.quality-row{display:flex;flex-direction:column;gap:8px;}
.quality-head{display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.modal-actions{
  padding:0 20px 20px;
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.modal-actions.three{grid-template-columns:repeat(3,1fr);}
.modal-action{
  padding:14px 8px;
  border-radius:12px;font-weight:600;font-size:14px;
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:all .15s;
}
.modal-action:hover{border-color:var(--primary);}
.modal-action svg{width:20px;height:20px;}
.modal-action:active{transform:scale(.96);}
.modal-action.primary{
  background:var(--primary);border-color:var(--primary);color:#fff;
}
.modal-action.primary:hover{background:color-mix(in srgb,var(--primary) 88%,black);}
.modal-action span{font-size:11px;font-weight:600;opacity:.85;}
.modal-close{
  position:absolute;top:12px;right:12px;
  width:32px;height:32px;border-radius:10px;
  background:var(--surface-2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text-2);
  transition:color .15s,border-color .15s;
}
.modal-close:hover{color:var(--text);border-color:var(--primary);}
.modal-close svg{width:16px;height:16px;}

/* ---------- TOAST ---------- */
.toast-wrap{
  position:fixed;top:calc(var(--safe-t) + var(--topbar-h) + 8px);left:50%;transform:translateX(-50%);
  z-index:170;
  display:flex;flex-direction:column;gap:8px;
  pointer-events:none;
}
.toast{
  background:var(--surface);
  border:1px solid var(--border-strong);
  padding:10px 16px;border-radius:14px;
  font-size:13px;font-weight:600;color:var(--text);
  display:flex;align-items:center;gap:10px;
  box-shadow:var(--shadow-lg);
  animation:toastIn .25s ease,toastOut .25s 1.7s ease forwards;
  max-width:320px;
}
.toast.success{border-color:var(--success);color:var(--success);}
.toast.error{border-color:var(--danger);color:var(--danger);}
.toast svg{width:16px;height:16px;flex-shrink:0;}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
@keyframes toastOut{to{opacity:0;transform:translateY(-10px);}}

/* ---------- MENU SHEET ---------- */
.sheet{
  position:fixed;inset:0;z-index:140;
  display:none;
  background:var(--modal-bg);
  backdrop-filter:blur(6px);
  animation:fadeIn .2s ease;
}
.sheet.active{display:flex;align-items:flex-end;}
.sheet-card{
  width:100%;background:var(--surface);
  border-radius:22px 22px 0 0;
  padding:8px 0 calc(var(--safe-b) + 16px);
  border-top:1px solid var(--border);
  box-shadow:var(--shadow-lg);
  animation:slideUp .3s cubic-bezier(.2,.8,.2,1);
}
.sheet-handle{
  width:40px;height:4px;border-radius:2px;background:var(--text-3);
  margin:8px auto 12px;opacity:.4;
}
.sheet-item{
  display:flex;align-items:center;gap:14px;
  padding:13px 22px;
  font-size:15px;font-weight:500;color:var(--text);
  width:100%;text-align:left;
}
.sheet-item:hover{background:var(--surface-2);}
.sheet-item:active{background:var(--surface-2);}
.sheet-item svg{width:20px;height:20px;color:var(--text-2);}
.sheet-item.danger{color:var(--danger);}
.sheet-item.danger svg{color:var(--danger);}
.sheet-divider{height:1px;background:var(--border);margin:6px 22px;}

/* ---------- EFFECTS GRID ---------- */
.effect-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  padding:4px 0 8px;
}
.effect-tile{
  padding:12px 6px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-size:11px;font-weight:600;color:var(--text-2);
  transition:all .15s;
}
.effect-tile:hover{border-color:color-mix(in srgb,var(--primary) 35%,var(--border));}
.effect-tile:active{transform:scale(.95);}
.effect-tile.active{
  background:color-mix(in srgb,var(--primary) 12%,var(--surface));
  border-color:var(--primary);color:var(--text);
}
.effect-tile svg{width:22px;height:22px;}

/* ---------- LOADING ---------- */
.spinner{
  width:24px;height:24px;border-radius:50%;
  border:2px solid var(--border);border-top-color:var(--primary);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-overlay{
  position:fixed;inset:0;background:var(--modal-bg);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;z-index:180;
}
.loading-overlay.active{display:flex;}
.loading-card{
  background:var(--surface);padding:24px 32px;border-radius:18px;border:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;gap:14px;color:var(--text);
  box-shadow:var(--shadow-lg);
}

.hidden-input{
  position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;
}

/* iPad / wider */
@media (min-width:720px){
  .control-body{padding:8px 24px 18px;}
  .filter-thumb{width:78px;height:78px;}
  .filter-tile{width:78px;}
  .adjust-tile{width:74px;}
}
</style>
</head>
<body>

  <button class="welcome-theme-btn" id="welcomeThemeBtn" aria-label="Toggle theme"></button>
  <div class="welcome-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>

      <div class="welcome-btn-text">
        <span>Paste from Clipboard</span>

      </div>

  </div>
  <div class="welcome-samples">

</div>

<!-- ========== TOP BAR ========== -->
<header class="topbar" id="topbar">
  <button class="tb-btn" id="menuBtn" aria-label="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

  </button>
  <button class="tb-btn" id="redoBtn" aria-label="Redo" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6.7 2.9L21 13"/></svg>

  <div class="tb-title">
    <span class="tb-title-dot"></span>
    <span id="appTitle">Studio</span>
  </div>
  <button class="tb-btn" id="themeBtn" aria-label="Toggle theme"></button>
  <button class="tb-btn" id="compareBtn" aria-label="Compare">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
  </button>
  <button class="tb-btn" id="resetBtn" aria-label="Reset">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 10 9 10"/></svg>
  </button>
  <button class="tb-btn export" id="exportBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Save
  </button>

<!-- ========== CANVAS AREA ========== -->
<main class="canvas-wrap" id="canvasWrap">
  <div class="canvas-hud">

/* ================================================================

const THEME_KEY = 'theme2';
const DARK_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17q-2.075 0-3.537-1.463T7 12t1.463-3.537T12 7t3.538 1.463T17 12t-1.463 3.538T12 17M2 13q-.425 0-.712-.288T1 12t.288-.712T2 11h2q.425 0 .713.288T5 12t-.288.713T4 13zm18 0q-.425 0-.712-.288T19 12t.288-.712T20 11h2q.425 0 .713.288T23 12t-.288.713T22 13zm-8-8q-.425 0-.712-.288T11 4V2q0-.425.288-.712T12 1t.713.288T13 2v2q0 .425-.288.713T12 5m0 18q-.425 0-.712-.288T11 22v-2q0-.425.288-.712T12 19t.713.288T13 20v2q0 .425-.288.713T12 23M5.65 7.05L4.575 6q-.3-.275-.288-.7t.288-.725q.3-.3.725-.3t.7.3L7.05 5.65q.275.3.275.7t-.275.7t-.687.288t-.713-.288M18 19.425l-1.05-1.075q-.275-.3-.275-.712t.275-.688q.275-.3.688-.287t.712.287L19.425 18q.3.275.288.7t-.288.725q-.3.3-.725.3t-.7-.3M16.95 7.05q-.3-.275-.288-.687t.288-.713L18 4.575q.275-.3.7-.288t.725.288q.3.3.3.725t-.3.7L18.35 7.05q-.3.275-.7.275t-.7-.275M4.575 19.425q-.3-.3-.3-.725t.3-.7l1.075-1.05q.3-.275.712-.275t.688.275q.3.275.288.688t-.288.712L6 19.425q-.275.3-.7.288t-.725-.288"/></svg>';
const LIGHT_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="m14.712 7.596l-2.289-2.288l2.289-2.289L17 5.308zm5 3l-1.289-1.288l1.289-1.289L21 9.308zM12.075 21q-1.888 0-3.543-.713T5.64 18.336t-1.951-2.893t-.714-3.543q0-2.92 1.68-5.265t4.436-3.27q-.104 2.34.717 4.501q.82 2.161 2.48 3.82q1.66 1.66 3.82 2.481t4.502.717q-.92 2.754-3.268 4.435T12.075 21"/></svg>';

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem(THEME_KEY, theme);
  const icon = theme === 'dark' ? LIGHT_SVG : DARK_SVG;
  const btn = document.getElementById('themeBtn');
  const wBtn = document.getElementById('welcomeThemeBtn');
  if (btn) btn.innerHTML = icon;
  if (wBtn) wBtn.innerHTML = icon;
  // Update meta theme-color
  const m = document.querySelector('meta[name="theme-color"]');
  if (m) m.setAttribute('content', theme === 'dark' ? '#0f0f0e' : '#fafaf7');
}
(function initTheme() {
  const stored = localStorage.getItem(THEME_KEY);
  applyTheme(stored === 'dark' ? 'dark' : 'light');
})();

/* ================================================================
   APP STATE
   ================================================================ */
const App = {
  // ----- Layer system -----
  layers: [],              // array of layer objects (bottom -> top)
  activeLayerId: null,
  nextLayerId: 1,

  // ----- Workspace dims -----
  imgW: 0, imgH: 0,
  workW: 0, workH: 0,
  maxWork: 2400,

  // ----- Preview render size (for slider drags) -----
  previewMaxDim: 720,
  isPreviewActive: false,  // currently dragging slider, use low-res

  // ----- Render canvases -----
  canvas: null,
  ctx: null,
  composite: null,         // offscreen full-res composite canvas
  compositeCtx: null,
  previewCanvas: null,
  previewCtx: null,

  // ----- Adjustments (apply to base image layer) -----

  // ----- Active filter -----

  // ----- Effects (sub-set, no grain dup) -----
  effects: {

    posterize: 0, edge: 0, emboss: 0, glitch: 0, duotone: 0,

  // ----- Transform (base) -----
  rotation: 0,
  flipH: false, flipV: false,

  // ----- Crop -----
  cropAspect: 'free',
  cropRect: null,

  // ----- Drawing -----
  drawTool: 'brush',       // brush | eraser

  brushColor: '#0f766e',
  brushOpacity: 1,

  pan: { x:0, y:0 },
  fitScale: 1,

  // ----- History -----
  history: [],
  historyIndex: -1,
  maxHistory: 30,

  // ----- UI -----
  activeTool: 'adjust',
  activeAdjust: 'exposure',
  activeEffect: 'blur',
  comparing: false,

  // ----- Sliders -----
  sliderTapTimes: new Map(),  // last touchend per slider for double-tap detect
};

function createDefaultAdjustments() {
  return {
    exposure: 0, brightness: 0, contrast: 0,
    highlights: 0, shadows: 0, whites: 0, blacks: 0,
    saturation: 0, vibrance: 0, hue: 0,
    temperature: 0, tint: 0,
    sharpness: 0, clarity: 0,
    fade: 0, vignette: 0, grain: 0,
  };
}
function createDefaultEffects() {
  return { blur: 0, pixelate: 0, vignette: 0, posterize: 0, edge: 0, emboss: 0, glitch: 0, duotone: 0 };
}

/* ================================================================
   LAYERS
   ================================================================ */
/**
 * Layer schema:
 * {
 *   id: number,
 *   name: string,
 *   type: 'image' | 'drawing' | 'text' | 'shape' | 'adjustment' | 'frame',
 *   canvas: HTMLCanvasElement,  // workspace dims
 *   visible: boolean,
 *   opacity: number,            // 0..1
 *   blendMode: string,
 *   x: number, y: number,
 *   scale: number,
 *   rotation: number,           // degrees
 *   mask: HTMLCanvasElement|null,
 *   maskInverted: boolean,
 *   locked: boolean,            // can't be deleted (background)
 *   meta: {...}                 // type-specific
 * }
 */
function createBlankLayerCanvas() {
  const c = document.createElement('canvas');
  c.width = App.workW;
  c.height = App.workH;
  return c;
}
function makeLayer(opts) {
  const layer = {
    id: App.nextLayerId++,
    name: opts.name || 'Layer',
    type: opts.type || 'drawing',
    canvas: opts.canvas || createBlankLayerCanvas(),
    visible: opts.visible !== false,
    opacity: opts.opacity != null ? opts.opacity : 1,
    blendMode: opts.blendMode || 'source-over',
    x: opts.x || 0,
    y: opts.y || 0,
    scale: opts.scale != null ? opts.scale : 1,
    rotation: opts.rotation || 0,
    mask: opts.mask || null,
    maskInverted: !!opts.maskInverted,
    locked: !!opts.locked,
    meta: opts.meta || {},
  };
  return layer;
}
function findLayer(id) {
  return App.layers.find(l => l.id === id) || null;
}
function activeLayer() {
  return findLayer(App.activeLayerId);
}
function backgroundLayer() {
  return App.layers.find(l => l.type === 'image' && l.locked) || App.layers[0] || null;
}
function indexOfLayer(id) {
  return App.layers.findIndex(l => l.id === id);
}

function addLayer(layer, opts={}) {
  // insert above active layer by default
  let insertAt = App.layers.length;
  if (App.activeLayerId != null && !opts.atTop) {
    const idx = indexOfLayer(App.activeLayerId);
    if (idx >= 0) insertAt = idx + 1;
  }
  App.layers.splice(insertAt, 0, layer);
  if (!opts.silent) App.activeLayerId = layer.id;
  return layer;
}

function removeLayer(id) {
  const idx = indexOfLayer(id);
  if (idx < 0) return;
  if (App.layers[idx].locked) return;
  App.layers.splice(idx, 1);
  if (App.activeLayerId === id) {
    App.activeLayerId = App.layers[App.layers.length - 1]?.id || null;
  }
}
function duplicateLayer(id) {
  const src = findLayer(id);
  if (!src) return null;
  const nc = createBlankLayerCanvas();
  nc.getContext('2d').drawImage(src.canvas, 0, 0);
  let nm = null;
  if (src.mask) {
    nm = createBlankLayerCanvas();
    nm.getContext('2d').drawImage(src.mask, 0, 0);
  }
  const copy = makeLayer({
    name: src.name + ' copy',
    type: src.type === 'image' && src.locked ? 'image' : src.type,
    canvas: nc,
    visible: src.visible,
    opacity: src.opacity,
    blendMode: src.blendMode,
    x: src.x, y: src.y, scale: src.scale, rotation: src.rotation,
    mask: nm, maskInverted: src.maskInverted,
    locked: false,
    meta: JSON.parse(JSON.stringify(src.meta)),
  });
  const idx = indexOfLayer(id);
  App.layers.splice(idx + 1, 0, copy);
  App.activeLayerId = copy.id;
  return copy;
}
function reorderLayer(id, newIndex) {
  const idx = indexOfLayer(id);
  if (idx < 0) return;
  const layer = App.layers.splice(idx, 1)[0];
  newIndex = clamp(newIndex, 0, App.layers.length);
  App.layers.splice(newIndex, 0, layer);
}
function setActiveLayer(id) {
  App.activeLayerId = id;
}

/* ================================================================

   ================================================================ */
function clamp(v, mn, mx) { return v < mn ? mn : v > mx ? mx : v; }
function lerp(a, b, t) { return a + (b - a) * t; }

function toast(msg, type='', duration=2000) {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  const ico = type === 'success'
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
    : type === 'error'
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
      : '';
  t.innerHTML = ico + '<span>' + msg + '</span>';
  els.toastWrap.appendChild(t);
  setTimeout(() => t.remove(), duration);
}

function loading(show, text='Processing…') {
  if (show) {
    els.loadingText.textContent = text;
    els.loadingOverlay.classList.add('active');
  } else {
    els.loadingOverlay.classList.remove('active');
  }
}

/* ================================================================
   IMAGE LOADING
   ================================================================ */
function loadImageFromSource(src, asNewLayer=false) {
  loading(true, asNewLayer ? 'Adding layer…' : 'Loading image…');
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    if (asNewLayer) {
      addImageAsLayer(img);
    } else {
      initFromImage(img);
    }
    loading(false);
  };
  img.onerror = () => {
    loading(false);
    toast('Could not load image', 'error');
  };
  img.src = src;
}

function initFromImage(img) {
  App.imgW = img.naturalWidth;
  App.imgH = img.naturalHeight;

  // Compute working dims
  const maxDim = Math.max(App.imgW, App.imgH);
  const scale = maxDim > App.maxWork ? App.maxWork / maxDim : 1;
  App.workW = Math.max(1, Math.round(App.imgW * scale));
  App.workH = Math.max(1, Math.round(App.imgH * scale));

  App.canvas.width = App.workW;
  App.canvas.height = App.workH;
  App.composite.width = App.workW;
  App.composite.height = App.workH;
  els.interactCanvas.width = App.workW;
  els.interactCanvas.height = App.workH;

  // Compute preview dims
  setupPreview();

  // Reset everything
  App.adjustments = createDefaultAdjustments();
  App.effects = createDefaultEffects();
  App.activeFilter = 'none';
  App.filterStrength = 100;
  App.rotation = 0;
  App.flipH = false; App.flipV = false;
  App.cropRect = null;
  App.history = [];
  App.historyIndex = -1;
  App.layers = [];
  App.activeLayerId = null;
  App.nextLayerId = 1;

  // Create background layer
  const bgCanvas = createBlankLayerCanvas();
  const bgCtx = bgCanvas.getContext('2d');
  bgCtx.drawImage(img, 0, 0, App.workW, App.workH);
  const bg = makeLayer({
    name: 'Background',
    type: 'image',
    canvas: bgCanvas,
    visible: true,
    locked: true,
    meta: { isBase: true, originalImage: img },
  });
  App.layers.push(bg);
  App.activeLayerId = bg.id;

  els.welcome.classList.add('hidden');
  fitCanvasToView();
  renderFull();
  pushHistory();
  updateToolPanel();
  toast('Image loaded', 'success');
}

function setupPreview() {
  // Compute preview dimensions
  const maxDim = Math.max(App.workW, App.workH);
  const k = maxDim > App.previewMaxDim ? App.previewMaxDim / maxDim : 1;
  App.previewCanvas.width = Math.max(1, Math.round(App.workW * k));
  App.previewCanvas.height = Math.max(1, Math.round(App.workH * k));
}

function addImageAsLayer(img) {
  // Add image as new layer, fitted to workspace
  const c = createBlankLayerCanvas();
  const ctx = c.getContext('2d');
  // Center & fit inside workspace
  const sx = img.naturalWidth, sy = img.naturalHeight;
  const k = Math.min(App.workW / sx, App.workH / sy);
  const w = sx * k, h = sy * k;
  ctx.drawImage(img, (App.workW - w)/2, (App.workH - h)/2, w, h);

  const layer = makeLayer({
    name: 'Image',
    type: 'image',
    canvas: c,
  });
  addLayer(layer);
  renderFull();
  pushHistory();
  updateToolPanel();
  toast('Layer added', 'success');
}

async function pasteFromClipboard() {
  try {
    if (!navigator.clipboard?.read) {
      toast('Paste not supported here', 'error');
      return;
    }
    const items = await navigator.clipboard.read();
    for (const item of items) {
      for (const type of item.types) {
        if (type.startsWith('image/')) {
          const blob = await item.getType(type);
          const reader = new FileReader();
          reader.onload = e => loadImageFromSource(e.target.result, false);
          reader.readAsDataURL(blob);
          return;
        }
      }
    }
    toast('No image in clipboard', 'error');
  } catch (e) {
    toast('Clipboard access denied', 'error');
  }
}

window.addEventListener('dragover', e => { e.preventDefault(); });
window.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = e => loadImageFromSource(e.target.result, false);
    reader.readAsDataURL(f);
  }
});
window.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const it of items) {
    if (it.type.startsWith('image/')) {
      const blob = it.getAsFile();
      const reader = new FileReader();
      reader.onload = e => loadImageFromSource(e.target.result, false);
      reader.readAsDataURL(blob);
      return;
    }
  }
});

/* ================================================================
   PIXEL OPS — All adjustments via pixel-level math (mobile safe)
   ================================================================ */
function applyAdjustmentsToImageData(imgData, adjustments, opts={}) {
  const a = adjustments;
  const d = imgData.data;
  const len = d.length;

  // Pre-compute scales
  const expK   = Math.pow(2, a.exposure / 100); // stops-ish
  const brK    = a.brightness / 100 * 0.6;       // -0.6..+0.6 added to normalized
  const ctK    = a.contrast / 100;               // -1..+1
  const satK   = a.saturation / 100;
  const vibK   = a.vibrance / 100;
  const hueR   = a.hue * Math.PI / 180;
  const tempK  = a.temperature / 100;
  const tintK  = a.tint / 100;
  const hlK    = a.highlights / 100;
  const shK    = a.shadows / 100;
  const whK    = a.whites / 100;
  const blK    = a.blacks / 100;
  const clK    = a.clarity / 100;
  const fadeK  = a.fade / 100;

  // Hue rotation matrix (YIQ approximation)
  const cosH = Math.cos(hueR), sinH = Math.sin(hueR);
  // Standard YIQ-based hue rotation matrix coefficients
  const m = [
    0.213 + cosH*0.787 - sinH*0.213,
    0.715 - cosH*0.715 - sinH*0.715,
    0.072 - cosH*0.072 + sinH*0.928,
    0.213 - cosH*0.213 + sinH*0.143,
    0.715 + cosH*0.285 + sinH*0.140,
    0.072 - cosH*0.072 - sinH*0.283,
    0.213 - cosH*0.213 - sinH*0.787,
    0.715 - cosH*0.715 + sinH*0.715,
    0.072 + cosH*0.928 + sinH*0.072,
  ];

  for (let i = 0; i < len; i += 4) {
    let r = d[i], g = d[i+1], b = d[i+2];

    // Exposure (multiplicative, like stops)
    if (expK !== 1) {
      r *= expK; g *= expK; b *= expK;
    }
    // Brightness (additive)
    if (brK !== 0) {
      const add = brK * 255;
      r += add; g += add; b += add;
    }

    // Temperature (warmer = +R, -B)
    if (tempK !== 0) {
      r += tempK * 30; b -= tempK * 30;
    }
    // Tint (green vs magenta)
    if (tintK !== 0) {
      g -= tintK * 25; r += tintK * 8; b += tintK * 8;
    }

    // Contrast (around 128)
    if (ctK !== 0) {
      const c = 1 + ctK * 0.8;
      r = (r - 128) * c + 128;
      g = (g - 128) * c + 128;
      b = (b - 128) * c + 128;
    }

    // Hue rotation (after RGB adjustments)
    if (hueR !== 0) {
      const nr = m[0]*r + m[1]*g + m[2]*b;
      const ng = m[3]*r + m[4]*g + m[5]*b;
      const nb = m[6]*r + m[7]*g + m[8]*b;
      r = nr; g = ng; b = nb;
    }

    // Saturation
    if (satK !== 0) {
      const lum = 0.2126*r + 0.7152*g + 0.0722*b;
      const f = 1 + satK;
      r = lum + (r - lum) * f;
      g = lum + (g - lum) * f;
      b = lum + (b - lum) * f;
    }

    // Vibrance (saturate less-saturated more)
    if (vibK !== 0) {
      const mx = Math.max(r, g, b);
      const mn = Math.min(r, g, b);
      const sat = (mx - mn) / 255;
      const f = vibK * (1 - sat) * 1.5;
      const avg = (r + g + b) / 3;
      r = r + (r - avg) * f;
      g = g + (g - avg) * f;
      b = b + (b - avg) * f;
    }

    // Highlights / Shadows / Whites / Blacks (based on luminance masks)
    if (hlK !== 0 || shK !== 0 || whK !== 0 || blK !== 0) {
      const lN = clamp((0.2126*r + 0.7152*g + 0.0722*b) / 255, 0, 1);
      const hMask = lN * lN;                  // bright pixels
      const sMask = (1 - lN) * (1 - lN);     // dark pixels
      const wMask = hMask * hMask;            // very bright
      const bMask = sMask * sMask;            // very dark
      const adj = hlK * hMask * 50 + shK * sMask * 50 + whK * wMask * 60 - blK * bMask * 60;
      r += adj; g += adj; b += adj;
    }

    // Clarity (local-ish contrast via luminance push)
    if (clK !== 0) {
      const lN = (0.2126*r + 0.7152*g + 0.0722*b) / 255;
      const f = clK * 0.5;
      const newL = lN + f * (lN - 0.5);
      const k = lN > 0.001 ? newL / lN : 1;
      r *= k; g *= k; b *= k;
    }

    // Fade (lift blacks, lower contrast)
    if (fadeK > 0) {
      const lift = 40 * fadeK;
      r = r + (lift - r * fadeK * 0.18);
      g = g + (lift - g * fadeK * 0.18);
      b = b + (lift - b * fadeK * 0.18);
    }

    // Clamp & write
    d[i]   = r < 0 ? 0 : r > 255 ? 255 : r;
    d[i+1] = g < 0 ? 0 : g > 255 ? 255 : g;
    d[i+2] = b < 0 ? 0 : b > 255 ? 255 : b;
  }

  // Sharpness — convolution (skipped in preview-only mode for perf)
  if (a.sharpness > 0 && !opts.skipExpensive) {
    applySharpen(imgData, a.sharpness / 100);
  }
}

function applyEffectsToImageData(imgData, effects, adjustments, opts={}) {

            gy += v * ky;

    const k = e.emboss / 100;

  }

  // Glitch (RGB channel shift)
  if (e.glitch > 0) {
    const src = new Uint8ClampedArray(d);
    const off = Math.round(e.glitch / 100 * 20);
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {

        const rIdx = (y*W + Math.min(W-1, x+off)) * 4;
        const bIdx = (y*W + Math.max(0, x-off)) * 4;
        d[i] = src[rIdx];
        d[i+2] = src[bIdx+2];
      }
    }
  }

  // Duotone
  if (e.duotone > 0) {
    const k = e.duotone / 100;
    const c1 = [40, 30, 90];
    const c2 = [255, 180, 80];
    for (let i = 0; i < d.length; i += 4) {
      const lum = (d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114) / 255;
      const r = c1[0] + (c2[0] - c1[0]) * lum;
      const g = c1[1] + (c2[1] - c1[1]) * lum;
      const b = c1[2] + (c2[2] - c1[2]) * lum;

    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random() - 0.5) * intensity;
      d[i]   = clamp(d[i]   + n, 0, 255);
      d[i+1] = clamp(d[i+1] + n, 0, 255);
      d[i+2] = clamp(d[i+2] + n, 0, 255);
    }
  }
}

function applyToneShiftToImageData(imgData, tone, strength) {

  const [dr, dg, db] = tone;
  const k = strength / 100;
  const d = imgData.data;

    d[i+1] = clamp(d[i+1] + dg * k, 0, 255);
    d[i+2] = clamp(d[i+2] + db * k, 0, 255);
  }

/* Sharpen via 3x3 unsharp mask */

  }

/* Separable box-blur in place — Gaussian-like with multiple passes */

  const n = r * 2 + 1;

    let sumR = 0, sumG = 0, sumB = 0, sumA = 0;
    for (let k = -r; k <= r; k++) {
      const y = clamp(k, 0, H-1);
      const i = (y*W + x) * 4;
      sumR += src[i]; sumG += src[i+1]; sumB += src[i+2]; sumA += src[i+3];
    }
    for (let y = 0; y < H; y++) {
      const i = (y*W + x) * 4;
      dst[i] = sumR / n;
      dst[i+1] = sumG / n;
      dst[i+2] = sumB / n;
      dst[i+3] = sumA / n;
      const outY = clamp(y - r, 0, H-1);
      const inY  = clamp(y + r + 1, 0, H-1);

      const ii = (inY*W + x)  * 4;
      sumR += src[ii] - src[oi];
      sumG += src[ii+1] - src[oi+1];
      sumB += src[ii+2] - src[oi+2];
      sumA += src[ii+3] - src[oi+3];

/* ================================================================
   RENDER PIPELINE
   - renderFull: full-res composite
   - renderPreview: low-res for slider drag
   - rendering uses requestAnimationFrame coalescing
   ================================================================ */
let _renderRAF = 0;
let _previewRAF = 0;
let _pendingFullRender = false;

function requestRender() {
  if (App.isPreviewActive) {
    if (_previewRAF) return;
    _previewRAF = requestAnimationFrame(() => {
      _previewRAF = 0;
      renderPreview();
    });
  } else {
    if (_renderRAF) return;
    _renderRAF = requestAnimationFrame(() => {
      _renderRAF = 0;
      renderFull();
    });
  }
}

function renderFull() {
  if (App.layers.length === 0) return;

  const W = App.workW, H = App.workH;
  if (App.canvas.width !== W) App.canvas.width = W;
  if (App.canvas.height !== H) App.canvas.height = H;
  if (App.composite.width !== W) App.composite.width = W;
  if (App.composite.height !== H) App.composite.height = H;

  composeLayers(App.composite, App.compositeCtx, W, H, /*previewScale*/1);

  // Final blit to display canvas
  App.ctx.clearRect(0, 0, W, H);
  App.ctx.drawImage(App.composite, 0, 0);

  // Refresh layer thumbs after a stable render
  scheduleLayerThumbsUpdate();
}

function renderPreview() {
  if (App.layers.length === 0) return;

  setupPreview();
  const pW = App.previewCanvas.width;
  const pH = App.previewCanvas.height;

  composeLayers(App.previewCanvas, App.previewCtx, pW, pH, pW / App.workW);

  // Draw onto display canvas, upscaled
  App.canvas.width = App.workW;
  App.canvas.height = App.workH;
  App.ctx.clearRect(0, 0, App.workW, App.workH);
  App.ctx.imageSmoothingEnabled = true;
  App.ctx.imageSmoothingQuality = 'low';
  App.ctx.drawImage(App.previewCanvas, 0, 0, App.workW, App.workH);
}

/* Reusable temp canvases (per-compose-call). Avoids GC churn. */
const _composeTmp = document.createElement('canvas');
const _composeTmpCtx = _composeTmp.getContext('2d', { willReadFrequently: true });

  if (_composeTmp.width !== W) _composeTmp.width = W;
  if (_composeTmp.height !== H) _composeTmp.height = H;
  return _composeTmp;
}

/**
 * Compose all visible layers onto target ctx.
 * For the base "image" locked layer, we apply adjustments/filter/effects/base-transform.
 */
function composeLayers(target, tctx, W, H, scale=1) {
  tctx.clearRect(0, 0, W, H);

  const bg = backgroundLayer();
  const bgIdx = bg ? indexOfLayer(bg.id) : -1;

  for (let i = 0; i < App.layers.length; i++) {
    const layer = App.layers[i];
    if (!layer.visible) continue;
    if (layer.opacity <= 0) continue;

    if (i === bgIdx) {
      drawBaseLayer(target, tctx, layer, W, H, scale);
    } else {
      drawLayer(target, tctx, layer, W, H, scale);
    }
  }
}

/**
 * Draw the base (background) layer with adjustments + filter + effects + base transform.
 */
function drawBaseLayer(target, tctx, layer, W, H, scale) {
  // 1) Render layer canvas with base transform into a temp canvas
  const tmp = getComposeTmp(W, H);
  const tx = _composeTmpCtx;
  tx.clearRect(0, 0, W, H);

  // apply base transform (rotation/flip) — straighten in [-45..45]
  tx.save();
  tx.translate(W/2, H/2);
  if (App.rotation) tx.rotate(App.rotation * Math.PI / 180);
  tx.scale(App.flipH ? -1 : 1, App.flipV ? -1 : 1);
  // Scale layer canvas (which is at App.workW x App.workH) into target W x H
  tx.drawImage(layer.canvas, -W/2, -H/2, W, H);
  tx.restore();

  // 2) Apply filter preset (as additional adjustment values)
  const filt = getFilter(App.activeFilter);
  let merged = { ...App.adjustments };
  if (filt.adj && App.filterStrength > 0) {
    const f = App.filterStrength / 100;
    for (const [k, v] of Object.entries(filt.adj)) {
      if (merged[k] != null) merged[k] = clamp(merged[k] + v * f, -300, 300);
    }
  }

  // 3) Pixel pass — apply adjustments + tone shift + effects
  const previewMode = App.isPreviewActive || scale < 1;
  const imgData = tx.getImageData(0, 0, W, H);
  applyAdjustmentsToImageData(imgData, merged, { skipExpensive: previewMode });
  if (filt.tone && App.filterStrength > 0) {
    applyToneShiftToImageData(imgData, filt.tone, App.filterStrength);
  }
  applyEffectsToImageData(imgData, App.effects, App.adjustments, { skipExpensive: previewMode });
  tx.putImageData(imgData, 0, 0);

  // 4) Apply mask if any
  applyMaskTo(tmp, layer);

  // 5) Draw to target with layer's opacity/blend/position
  tctx.save();
  tctx.globalAlpha = layer.opacity;
  tctx.globalCompositeOperation = layer.blendMode || 'source-over';
  tctx.drawImage(tmp, 0, 0);
  tctx.restore();
}

/**
 * Draw a non-base layer.
 */
function drawLayer(target, tctx, layer, W, H, scale) {
  // Build effective canvas with transform + mask in a temp canvas
  const tmp = getComposeTmp(W, H);
  const tx = _composeTmpCtx;
  tx.clearRect(0, 0, W, H);

  tx.save();
  // apply layer transform: translation (scaled to render size), rotation, scale
  const cx = W/2 + layer.x * scale;
  const cy = H/2 + layer.y * scale;
  tx.translate(cx, cy);
  if (layer.rotation) tx.rotate(layer.rotation * Math.PI / 180);
  if (layer.scale !== 1) tx.scale(layer.scale, layer.scale);
  tx.drawImage(layer.canvas, -W/2, -H/2, W, H);
  tx.restore();

  // mask
  applyMaskTo(tmp, layer);

  tctx.save();
  tctx.globalAlpha = layer.opacity;
  tctx.globalCompositeOperation = layer.blendMode || 'source-over';
  tctx.drawImage(tmp, 0, 0);
  tctx.restore();
}

function applyMaskTo(canvas, layer) {

  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  if (layer.maskInverted) {

    const inv = document.createElement('canvas');
    inv.width = W;
    inv.height = H;
    const ic = inv.getContext('2d');
    ic.fillStyle = '#fff';
    ic.fillRect(0, 0, W, H);
    ic.globalCompositeOperation = 'destination-out';
    ic.drawImage(layer.mask, 0, 0, W, H);
    ctx.drawImage(inv, 0, 0, W, H);

/* ================================================================
   FIT / PAN / ZOOM
   ================================================================ */
function fitCanvasToView() {
  const wrap = els.canvasWrap;
  const wrapW = wrap.clientWidth;
  const wrapH = wrap.clientHeight;
  const pad = 28;
  const aW = wrapW - pad * 2;
  const aH = wrapH - pad * 2;
  const scaleX = aW / App.workW;
  const scaleY = aH / App.workH;
  const scale = Math.min(scaleX, scaleY, 1);
  App.fitScale = scale;
  App.zoom = 1;
  App.pan = { x:0, y:0 };
  applyStageTransform();
}

function applyStageTransform() {
  const finalScale = App.fitScale * App.zoom;
  const t = `translate(${App.pan.x}px, ${App.pan.y}px) scale(${finalScale})`;
  els.canvasStage.style.transform = t;
  els.canvasStage.style.width = App.workW + 'px';
  els.canvasStage.style.height = App.workH + 'px';
}

/** Clamp pan so at least 20% of image dims stays on screen. */
function clampPan() {
  if (!App.workW) return;
  const wrap = els.canvasWrap;
  const wrapW = wrap.clientWidth;
  const wrapH = wrap.clientHeight;
  const totalScale = App.fitScale * App.zoom;
  const renderedW = App.workW * totalScale;
  const renderedH = App.workH * totalScale;
  // image center (in viewport coords) = wrapCenter + pan
  // The image's bounding box on screen: center +/- rendered/2
  // We require at least 20% of rendered dim overlap with viewport.
  const overlapW = renderedW * 0.2;
  const overlapH = renderedH * 0.2;
  const maxPanX = wrapW / 2 + renderedW / 2 - overlapW;
  const maxPanY = wrapH / 2 + renderedH / 2 - overlapH;
  App.pan.x = clamp(App.pan.x, -maxPanX, maxPanX);
  App.pan.y = clamp(App.pan.y, -maxPanY, maxPanY);
}

window.addEventListener('resize', () => {
  if (App.layers.length) {
    fitCanvasToView();
  }
  fixViewport();
});

function fixViewport() {
  document.documentElement.style.height = window.innerHeight + 'px';
}
fixViewport();

      App.pan.x = panStart.px + (e.clientX - panStart.x);
      App.pan.y = panStart.py + (e.clientY - panStart.y);
      clampPan();
      applyStageTransform();
    }
  });

  function endPointer(e) {
    if (activePointers.size === 2) pinchStart = null;
    activePointers.delete(e.pointerId);
    if (activePointers.size === 0) {
      panStart = null;
      stage.classList.remove('dragging');
      clampPan();
      applyStageTransform();
    }
  }
  wrap.addEventListener('pointerup', endPointer);
  wrap.addEventListener('pointercancel', endPointer);
  wrap.addEventListener('pointerleave', endPointer);

  // Wheel zoom (desktop)
  wrap.addEventListener('wheel', e => {
    if (!shouldHandle()) return;
    if (!App.layers.length) return;
    e.preventDefault();
    const dir = e.deltaY < 0 ? 1 : -1;
    const next = clamp(App.zoom * (1 + dir * 0.1), 0.4, 8);
    App.zoom = next;
    clampPan();
    applyStageTransform();
    els.zoomIndicator.textContent = Math.round(App.zoom * 100) + '%';
    showZoom();
  }, { passive: false });

  // Double-tap to fit
  let lastTap = 0;
  wrap.addEventListener('click', e => {
    if (!shouldHandle()) return;
    const now = Date.now();
    if (now - lastTap < 320) {
      fitCanvasToView();
    }
    lastTap = now;
  });
})();

els.fitBtn.addEventListener('click', () => fitCanvasToView());

function showOriginal() {
  // Draw the base image canvas directly without adjustments or effects.
  const bg = backgroundLayer();
  if (!bg) return;
  App.ctx.clearRect(0, 0, App.workW, App.workH);
  App.ctx.save();
  App.ctx.translate(App.workW/2, App.workH/2);
  if (App.rotation) App.ctx.rotate(App.rotation * Math.PI / 180);
  App.ctx.scale(App.flipH ? -1 : 1, App.flipV ? -1 : 1);
  App.ctx.drawImage(bg.canvas, -App.workW/2, -App.workH/2);
  App.ctx.restore();
}

/* ================================================================
   HISTORY (UNDO / REDO)
   ================================================================ */
function snapshotLayers() {
  return App.layers.map(l => {
    let canvasData = null;
    let maskData = null;
    try {
      canvasData = l.canvas.toDataURL('image/png');
      if (l.mask) maskData = l.mask.toDataURL('image/png');
    } catch (e) { /* ignore tainted canvas */ }
    return {
      id: l.id,
      name: l.name,
      type: l.type,
      visible: l.visible,
      opacity: l.opacity,
      blendMode: l.blendMode,
      x: l.x, y: l.y,
      scale: l.scale,
      rotation: l.rotation,
      maskInverted: l.maskInverted,
      locked: l.locked,
      meta: JSON.parse(JSON.stringify(l.meta || {})),
      canvasData,
      maskData,
    };
  });
}

function pushHistory() {
  const snap = {
    adjustments: { ...App.adjustments },
    effects: { ...App.effects },
    filter: App.activeFilter,
    filterStrength: App.filterStrength,
    rotation: App.rotation,
    flipH: App.flipH,
    flipV: App.flipV,
    activeLayerId: App.activeLayerId,
    layers: snapshotLayers(),
    workW: App.workW,
    workH: App.workH,
  };
  if (App.historyIndex < App.history.length - 1) {
    App.history = App.history.slice(0, App.historyIndex + 1);
  }
  App.history.push(snap);
  if (App.history.length > App.maxHistory) App.history.shift();
  App.historyIndex = App.history.length - 1;
  updateHistoryButtons();
}

function restoreFromSnap(snap) {
  App.adjustments = { ...snap.adjustments };
  App.effects = { ...snap.effects };
  App.activeFilter = snap.filter;
  App.filterStrength = snap.filterStrength;
  App.rotation = snap.rotation;
  App.flipH = snap.flipH;
  App.flipV = snap.flipV;
  App.workW = snap.workW;
  App.workH = snap.workH;
  App.canvas.width = App.workW;
  App.canvas.height = App.workH;
  App.composite.width = App.workW;
  App.composite.height = App.workH;
  els.interactCanvas.width = App.workW;
  els.interactCanvas.height = App.workH;
  setupPreview();

  // Reconstruct layers (async due to image decoding)
  const newLayers = [];
  const promises = snap.layers.map((ls, idx) => new Promise(res => {
    const layer = {
      id: ls.id, name: ls.name, type: ls.type,
      canvas: createBlankLayerCanvas(),
      visible: ls.visible, opacity: ls.opacity, blendMode: ls.blendMode,
      x: ls.x, y: ls.y, scale: ls.scale, rotation: ls.rotation,
      mask: null, maskInverted: ls.maskInverted,
      locked: ls.locked, meta: { ...ls.meta },
    };
    newLayers[idx] = layer;
    if (!ls.canvasData) return res();
    const img = new Image();
    img.onload = () => {
      const ctx = layer.canvas.getContext('2d');
      ctx.clearRect(0, 0, App.workW, App.workH);
      ctx.drawImage(img, 0, 0);
      if (ls.maskData) {
        const m = createBlankLayerCanvas();
        const mi = new Image();
        mi.onload = () => {
          m.getContext('2d').drawImage(mi, 0, 0);
          layer.mask = m;
          res();
        };
        mi.onerror = res;
        mi.src = ls.maskData;
      } else {
        res();
      }
    };
    img.onerror = res;
    img.src = ls.canvasData;
  }));
  Promise.all(promises).then(() => {
    App.layers = newLayers;
    App.activeLayerId = snap.activeLayerId;
    // ensure next id is unique
    const maxId = newLayers.reduce((m, l) => Math.max(m, l.id), 0);
    App.nextLayerId = maxId + 1;
    renderFull();
    updateToolPanel();
  });
}

function undo() {
  if (App.historyIndex <= 0) return;
  App.historyIndex--;
  restoreFromSnap(App.history[App.historyIndex]);
  updateHistoryButtons();
}
function redo() {
  if (App.historyIndex >= App.history.length - 1) return;
  App.historyIndex++;
  restoreFromSnap(App.history[App.historyIndex]);
  updateHistoryButtons();
}
function updateHistoryButtons() {
  els.undoBtn.disabled = App.historyIndex <= 0;
  els.redoBtn.disabled = App.historyIndex >= App.history.length - 1;
}
els.undoBtn.addEventListener('click', undo);
els.redoBtn.addEventListener('click', redo);

// Debounced history for slider drags
let _historyTimer = null;
function pushHistoryDebounced(delay=600) {
  clearTimeout(_historyTimer);
  _historyTimer = setTimeout(pushHistory, delay);
}

/* ================================================================
   SLIDER HELPER
   ================================================================ */
function formatValue(v, bipolar) {
  if (bipolar) return (v > 0 ? '+' : '') + v;
  return v;
}

function setupSlider(row, meta, opts) {
  // meta: { id, min, max, bipolar, defaultValue }
  // opts: { onInput, onCommit, onChange? }
  const input = row.querySelector('input[type=range]');
  const fill = row.querySelector('.slider-fill');
  const valEl = row.querySelector('.slider-value');
  const defaultValue = meta.defaultValue != null ? meta.defaultValue : (meta.bipolar ? 0 : meta.min);

  function updateUI() {
    const v = +input.value;
    const min = +input.min, max = +input.max;
    const pct = (v - min) / (max - min) * 100;
    if (meta.bipolar) {
      const midPct = (-min / (max - min)) * 100;
      if (pct >= midPct) {
        fill.style.left = midPct + '%';
        fill.style.width = (pct - midPct) + '%';
      } else {
        fill.style.left = pct + '%';
        fill.style.width = (midPct - pct) + '%';
      }
    } else {
      fill.style.left = '0%';
      fill.style.width = pct + '%';
    }
    if (valEl) valEl.textContent = formatValue(v, meta.bipolar);
  }
  updateUI();

  // Live update during drag (input event = preview)
  function startPreview() { App.isPreviewActive = true; }
  input.addEventListener('pointerdown', startPreview);
  input.addEventListener('touchstart', startPreview, { passive: true });
  input.addEventListener('mousedown', startPreview);
  function endPreview() {
    if (!App.isPreviewActive) return;
    App.isPreviewActive = false;
    // commit at full res
    requestRender();
    if (opts.onCommit) opts.onCommit(+input.value);
    pushHistoryDebounced(300);
  }
  input.addEventListener('pointerup', endPreview);
  input.addEventListener('pointercancel', endPreview);
  input.addEventListener('touchend', endPreview);
  input.addEventListener('touchcancel', endPreview);
  input.addEventListener('mouseup', endPreview);
  // The change event reliably fires on release for all input types.
  // It's our safety net to end preview mode + push history.

  input.addEventListener('input', () => {
    if (opts.onInput) opts.onInput(+input.value);
    updateUI();
  });
  input.addEventListener('change', () => {
    // Safety net: ensure preview ends and full-res commit happens
    if (App.isPreviewActive) {
      App.isPreviewActive = false;
      requestRender();
    }
    if (opts.onCommit) opts.onCommit(+input.value);
    pushHistoryDebounced(200);
  });

  // Double-tap on slider thumb resets to default
  let lastTap = 0;
  function onTap(e) {
    const now = Date.now();
    if (now - lastTap < 320) {
      input.value = defaultValue;
      if (opts.onInput) opts.onInput(defaultValue);
      if (opts.onCommit) opts.onCommit(defaultValue);
      updateUI();
      pushHistory();
      lastTap = 0;
    } else {
      lastTap = now;
    }
  }
  input.addEventListener('touchend', onTap);
  input.addEventListener('dblclick', () => {
    input.value = defaultValue;
    if (opts.onInput) opts.onInput(defaultValue);
    if (opts.onCommit) opts.onCommit(defaultValue);
    updateUI();
    pushHistory();
  });

  return { input, updateUI };
}

        if (titleVal) titleVal.textContent = v;
      },

        requestRender();
      },
    });
  }

  const grid = document.createElement('div');
  grid.className = 'h-scroll filter-row';
  FILTERS.forEach(f => {
    const tile = document.createElement('button');
    tile.className = 'filter-tile' + (f.id === App.activeFilter ? ' active' : '');
    tile.innerHTML = `
      <div class="filter-thumb"><canvas></canvas></div>

    `;

      App.activeFilter = f.id;
      App.filterStrength = 100;
      renderFull();

      pushHistory();
    });
    grid.appendChild(tile);
    requestAnimationFrame(() => drawFilterThumb(tile.querySelector('canvas'), f));
  });

function drawFilterThumb(canvas, filter) {
  const bg = backgroundLayer();
  if (!bg) return;
  canvas.width = 72; canvas.height = 72;
  const ctx = canvas.getContext('2d');
  const src = bg.canvas;
  const s = Math.min(src.width, src.height);
  const sx = (src.width - s) / 2;
  const sy = (src.height - s) / 2;
  ctx.drawImage(src, sx, sy, s, s, 0, 0, 72, 72);
  if (filter.adj || filter.tone) {
    const imgData = ctx.getImageData(0, 0, 72, 72);
    const adj = { ...createDefaultAdjustments(), ...(filter.adj || {}) };
    applyAdjustmentsToImageData(imgData, adj, { skipExpensive: true });
    if (filter.tone) applyToneShiftToImageData(imgData, filter.tone, 100);
    ctx.putImageData(imgData, 0, 0);
  }
}
