async function buildExportBlob() {
  // Build at full resolution for best quality
  const W = App.imgW, H = App.imgH;
  const scaleUp = W / App.workW;

  const out = document.createElement('canvas');
  // For very large images cap to reasonable export size
  const cap = 4096;
  const maxDim = Math.max(W, H);
  const exportScale = maxDim > cap ? cap / maxDim : 1;
  out.width = Math.round(W * exportScale);
  out.height = Math.round(H * exportScale);

  const ox = out.getContext('2d');

  // Render with original-resolution image
  const filterStr = buildCssFilter();
  ox.filter = filterStr;
  ox.save();
  ox.translate(out.width/2, out.height/2);
  if (App.rotation) ox.rotate(App.rotation * Math.PI / 180);
  ox.scale(App.flipH ? -1 : 1, App.flipV ? -1 : 1);
  ox.drawImage(App.image, -out.width/2, -out.height/2, out.width, out.height);
  ox.restore();

  // Pixel pass
  if (needsPixelPass()) {
    const imgData = ox.getImageData(0, 0, out.width, out.height);
    applyPixelAdjustments(imgData);
    applyPixelEffects(imgData);
    applyToneShift(imgData);
    ox.putImageData(imgData, 0, 0);
  }

  // Overlays - need to scale positions
  const scaleX = out.width / App.workW;
  const scaleY = out.height / App.workH;
  ox.save();
  for (const o of App.overlays) {
    ox.save();
    ox.translate(o.x * scaleX, o.y * scaleY);
    if (o.rotation) ox.rotate(o.rotation * Math.PI / 180);
    if (o.type === 'text') {
      ox.font = `${o.bold ? 'bold ' : ''}${o.italic ? 'italic ' : ''}${o.size * scaleX}px ${o.font}`;
      ox.fillStyle = o.color;
      ox.textBaseline = 'middle';
      ox.textAlign = 'center';
      if (o.stroke) {
        ox.strokeStyle = o.strokeColor || '#000';
        ox.lineWidth = (o.strokeWidth || 2) * scaleX;
        ox.strokeText(o.text, 0, 0);
      }
      ox.fillText(o.text, 0, 0);
    } else if (o.type === 'sticker') {
      ox.font = `${o.size * scaleX}px sans-serif`;
      ox.textBaseline = 'middle';
      ox.textAlign = 'center';
      ox.fillText(o.emoji, 0, 0);
    }
    ox.restore();
  }
  ox.restore();

  // Drawing layer
  ox.drawImage(App.drawCanvas, 0, 0, out.width, out.height);

  // Convert to blob
  const mimeMap = { png:'image/png', jpeg:'image/jpeg', webp:'image/webp' };
  const mime = mimeMap[exportFormat] || 'image/png';
  return new Promise(resolve => {
    out.toBlob(blob => resolve({blob, mime}), mime, exportFormat === 'png' ? undefined : exportQuality);
  });
}

els.exportDownload.addEventListener('click', async () => {
  loading(true, 'Exporting…');
  try {
    const {blob} = await buildExportBlob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `studio-${Date.now()}.${exportFormat === 'jpeg' ? 'jpg' : exportFormat}`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    loading(false);
    els.exportModal.classList.remove('active');
    toast('Saved', 'success');
  } catch (e) {
    loading(false);
    toast('Export failed', 'error');
    console.error(e);
  }
});

els.exportCopy.addEventListener('click', async () => {
  loading(true, 'Copying…');
  try {
    const {blob} = await buildExportBlob();
    if (!navigator.clipboard?.write) {
      // Fallback - download
      loading(false);
      toast('Clipboard not supported here', 'error');
      return;
    }
    // Convert to PNG for clipboard (most reliable)
    let finalBlob = blob;
    if (exportFormat !== 'png') {
      // re-render as PNG
      const tmp = await new Promise(r => {
        const c = document.createElement('canvas');
        const img = new Image();
        img.onload = () => {
          c.width = img.width; c.height = img.height;
          c.getContext('2d').drawImage(img, 0, 0);
          c.toBlob(b => r(b), 'image/png');
        };
        img.src = URL.createObjectURL(blob);
      });
      finalBlob = tmp;
    }
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': finalBlob })]);
    loading(false);
    els.exportModal.classList.remove('active');
    toast('Copied to clipboard', 'success');
  } catch (e) {
    loading(false);
    toast('Copy failed', 'error');
    console.error(e);
  }
});

els.exportShare.addEventListener('click', async () => {
  if (!navigator.share || !navigator.canShare) {
    toast('Share not supported here', 'error');
    return;
  }
  loading(true, 'Preparing share…');
  try {
    const {blob} = await buildExportBlob();
    const ext = exportFormat === 'jpeg' ? 'jpg' : exportFormat;
    const file = new File([blob], `studio-${Date.now()}.${ext}`, { type: blob.type });
    if (navigator.canShare({ files: [file] })) {
      loading(false);
      els.exportModal.classList.remove('active');
      await navigator.share({ files: [file], title: 'Studio Export' });
    } else {
      loading(false);
      toast('Cannot share this file', 'error');
    }
  } catch (e) {
    loading(false);
    if (e.name !== 'AbortError') toast('Share canceled', 'error');
  }
});

async function doCopyClipboard() {
  if (!App.image) return;
  loading(true, 'Copying…');
  try {
    const oldFormat = exportFormat;
    exportFormat = 'png';
    const {blob} = await buildExportBlob();
    exportFormat = oldFormat;
    if (!navigator.clipboard?.write) {
      loading(false);
      toast('Clipboard not supported', 'error');
      return;
    }
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    loading(false);
    toast('Copied to clipboard', 'success');
  } catch (e) {
    loading(false);
    toast('Copy failed', 'error');
  }
}

async function doShare() {
  if (!App.image) return;
  if (!navigator.share) {
    toast('Share not supported', 'error');
    return;
  }
  loading(true, 'Preparing…');
  try {
    const oldFormat = exportFormat;
    exportFormat = 'jpeg';
    const {blob} = await buildExportBlob();
    exportFormat = oldFormat;
    const file = new File([blob], `studio-${Date.now()}.jpg`, { type: 'image/jpeg' });
    loading(false);
    if (navigator.canShare?.({ files: [file] })) {
      await navigator.share({ files: [file], title: 'Studio Export' });
    } else {
      toast('Cannot share file', 'error');
    }
  } catch (e) {
    loading(false);
    if (e.name !== 'AbortError') toast('Share canceled');
  }
}

/* ================================================================
   INITIAL TOOL PANEL
   ================================================================ */
updateToolPanel();

// PWA enhancement - keep mobile viewport stable
function fixViewport() {
  document.documentElement.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', fixViewport);
fixViewport();

/* ================================================================
   KEYBOARD SHORTCUTS (for desktop testing)
   ================================================================ */
document.addEventListener('keydown', e => {
  if (e.target.matches('input,textarea,select')) return;
  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  else if ((e.metaKey || e.ctrlKey) && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) { e.preventDefault(); redo(); }
  else if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); els.exportBtn.click(); }
  else if ((e.metaKey || e.ctrlKey) && e.key === 'c') { e.preventDefault(); doCopyClipboard(); }
});

/* ================================================================
   PREVENT DEFAULTS FOR TOUCH
   ================================================================ */
['gesturestart','gesturechange','gestureend'].forEach(ev => {
  document.addEventListener(ev, e => e.preventDefault());
});

</script>
